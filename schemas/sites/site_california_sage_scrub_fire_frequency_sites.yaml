name: california_sage_scrub_fire_frequency_sites
title: California Sage Scrub Fire Frequency Sites
description: Jason Keller (Claremont McKenna) sampling California sage scrub ecosystems experiencing nonnative
  invasion, urbanization, and changing fire frequency to analyze carbon/nitrogen shifts and microbial
  community changes. Winter 2024 campaign.
