name: douglas_fir_forest_health_sites
title: Douglas-fir Forest Health Sites
description: James Lutz (Utah State) examining how belowground soil and microbial characteristics vary
  around large-diameter Douglas-fir trees at different life stages (healthy, declining, standing dead,
  decomposing logs). Winter 2024 campaign.
