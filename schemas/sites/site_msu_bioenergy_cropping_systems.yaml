id: https://w3id.org/nmdc-sfas-brcs/profiles/sites/site_msu_bioenergy_cropping_systems
name: msu_bioenergy_cropping_systems
title: MSU Bioenergy Cropping Systems
description: Alexandra Kravchenko (MSU) sampling energy sorghum, switchgrass (perennial monoculture),
  restored prairie (perennial polyculture), and poplar (fast-growing woody species) to obtain high-resolution
  molecular, microbial, and structural soil data. Goal is understanding microscale interactions leading
  to soil carbon accrual under long-term bioenergy cropping systems. Spring 2025 campaign.
