id: https://w3id.org/nmdc-sfas-brcs/profiles/sites/site_neon_terrestrial_sites_network
name: neon_terrestrial_sites_network
title: NEON Terrestrial Sites Network
description: MONet leverages NEON's 47 terrestrial field sites across 20 ecoclimatic domains spanning
  the continental United States, Alaska, Hawaii, and Puerto Rico. Sites represent diverse ecosystems including
  forests, grasslands, shrublands, and wetlands. Each domain has 1-3 terrestrial sites with standardized
  sampling protocols. MONet-NEON First Collection ran September 2023 to July 2024.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  SiteContext:
    description: Environmental context for site site_neon_terrestrial_sites_network.
    slots:
    - location
