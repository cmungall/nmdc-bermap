name: tennessee_river_basin_watersheds
title: Tennessee River Basin Watersheds
description: Three mid-order watersheds broadly representative of the Tennessee River Basin, studied successively
  over 9-year plan. Most intensively used freshwater resource region in contiguous US, supporting ~4.5
  million people with >280,000 gallons/day/sq mi withdrawals.
