id: https://w3id.org/nmdc-sfas-brcs/profiles/sites/site_umpqua_national_forest_wildfire_sites
name: umpqua_national_forest_wildfire_sites
title: Umpqua National Forest Wildfire Sites
description: USDA Forest Service ecologist Devin McMahon collecting and comparing severely burned soils
  with soils in areas of little apparent fire impact. Sampling allows land managers to assess effects
  of severe wildfire and postfire management on soil physical, chemical, and biological properties. Soil
  analyses provide microbial community data to form baseline for discussing potential impacts of forest
  management. Summer 2024 campaign.
