id: https://w3id.org/nmdc-sfas-brcs/profiles/sites/site_valles_caldera_national_preserve
name: valles_caldera_national_preserve
title: Valles Caldera National Preserve
description: Montane grassland site at highest elevation in the BFI gradient. Part of elevation/precipitation
  transect studying bacterial-fungal interactions across environmental conditions.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  SiteContext:
    description: Environmental context for site site_valles_caldera_national_preserve.
    slots:
    - elevation
    - location
    - mean_annual_precipitation
    - mean_annual_temperature
    - site_type
slots:
  elevation:
    range: float
    unit:
      descriptive_name: meter
      ucum_code: m
  location:
    description: Geographic location of the site.
    annotations:
      value: Jemez Mountains, New Mexico
  mean_annual_precipitation:
    range: float
    unit:
      descriptive_name: centimeter
      ucum_code: cm
  mean_annual_temperature:
    range: float
    unit:
      descriptive_name: degree Celsius
      ucum_code: Cel
  site_type:
    annotations:
      value: NATIONAL_PRESERVE
