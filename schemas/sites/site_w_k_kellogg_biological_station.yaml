name: w_k_kellogg_biological_station
title: W.K. Kellogg Biological Station
description: Michigan State University long-term ecological research site. Sarah Evans (MSU) is studying
  how agricultural management affects soil molecular properties, linking soil measurements to management
  decisions (tillage, cover crops, perennials) and ecosystem service outcomes. Summer 2024 campaign.
