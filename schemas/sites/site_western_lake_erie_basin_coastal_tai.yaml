name: western_lake_erie_basin_coastal_terrestrial_aquatic_interfaces
title: Western Lake Erie Basin Coastal Terrestrial-Aquatic Interfaces
description: COMPASS-FME freshwater coastal terrestrial-aquatic interface study region used to compare
