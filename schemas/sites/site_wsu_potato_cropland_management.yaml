id: https://w3id.org/nmdc-sfas-brcs/profiles/sites/site_wsu_potato_cropland_management
name: wsu_potato_cropland_management
title: WSU Potato Cropland Management
description: Deirdre Griffin-LaHue (WSU) investigating four soil management systems along a disturbance
  gradient in potato-driven crop rotations. Evaluating practices to improve soil functions including water
  supply, drainage, residue breakdown, and nutrient cycling while addressing soil degradation from intensive
  tillage. Winter 2024 campaign.
