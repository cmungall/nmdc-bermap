id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/4d_whole_cell_model_of_prochlorococcus_marinus_med4
name: _4d_whole_cell_model_of_prochlorococcus_marinus_med4
title: 4D Whole-Cell Model of Prochlorococcus marinus MED4
description: Spatiotemporal 4D (3D + time) whole-cell model of Prochlorococcus marinus MED4 representing
  the spatial organization of enzymatic and molecular processes in central carbon metabolism under light
  perturbation. Uses cryo-ET at 10 nm resolution as structural constraints. Demonstrates that redox-dependent
  post-translational modifications regulate the structural assembly of the "dark complex" (a protein megacomplex
  of Gap, CP12, and Prk), modulating metabolic flux at a conserved regulatory node of the Calvin-Benson
  cycle. Built using the Lattice Microbes platform. First spatiotemporal simulation of a photosynthetic
  autotroph.
