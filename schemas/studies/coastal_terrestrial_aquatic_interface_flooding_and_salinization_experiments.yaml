id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/coastal_terrestrial_aquatic_interface_flooding_and_salinization_experiments
name: coastal_terrestrial_aquatic_interface_flooding_and_salinization_experiments
title: Coastal Terrestrial-Aquatic Interface Flooding and Salinization Experiments
description: Field and laboratory investigation of flooding, salinization, and water-level manipulation
  effects on coastal terrestrial-aquatic interface ecosystem state, redox chemistry, carbon oxidation,
  soil-water-sediment-microbe-plant interactions, and greenhouse gas production.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study coastal_terrestrial_aquatic_interface_flooding_and_salinization_experiments.
    slots:
    - carbon_oxidation_and_greenhouse_gas_flux
    - coastal_study_region
    - flooding_regime
    - geographic_location
    - microbial_community_composition
    - redox_chemistry
    - salinity_condition
    - sample_collection_date
    - terrestrial_aquatic_interface_position
slots:
  carbon_oxidation_and_greenhouse_gas_flux:
    title: carbon oxidation and greenhouse gas flux
    description: Carbon oxidation, carbon dioxide production, methane production, or greenhouse gas flux
      response to hydrologic and redox changes.
    range: float
    aliases:
    - carbon_oxidation
    - co2_flux
    - methane_flux
    - greenhouse_gas_flux
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: coastal carbon cycling
      material_or_matrix: soil, sediment, water, or atmosphere
      value_type: NUMERIC
  coastal_study_region:
    title: coastal study region
    description: COMPASS-FME region or site network represented by each sample or time series.
    range: CoastalStudyRegionEnum
    aliases:
    - region
    - site
    - watershed
    annotations:
      role: GROUPING; SPATIAL_INDEX
      measured_entity: coastal terrestrial-aquatic interface
      value_type: CATEGORICAL
  flooding_regime:
    title: flooding regime
    description: Frequency, duration, depth, or source of flooding applied or observed in coastal TAI
      plots.
    range: float
    unit:
      descriptive_name: cm or days
    exact_mappings:
    - MIXS:0000008
    aliases:
    - flood_frequency
    - flood_duration
    - flood_depth
    - water_level
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: flooding disturbance
      value_type: NUMERIC
  geographic_location:
    title: geographic location
    description: Coordinates or named location of the coastal TAI sample or sensor.
    range: string
    aliases:
    - lat_lon
    - geo_loc_name
    - site_location
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      measured_entity: sample location
      value_type: TEXT
  microbial_community_composition:
    title: microbial community composition
    description: Molecular profile of microbial communities in coastal soil, sediment, water, or plant-associated
      samples.
    multivalued: true
    range: string
    aliases:
    - microbial_community
    - metagenome_profile
    - amplicon_profile
    - taxonomic_profile
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: coastal microbial community
      material_or_matrix: soil, sediment, water, or plant-associated material
      method: sequencing or molecular characterization
      value_type: ARRAY
  redox_chemistry:
    title: redox chemistry
    description: Redox state or redox-active chemical measurements used to characterize aerobic to anaerobic
      shifts.
    range: float
    aliases:
    - redox_potential
    - dissolved_oxygen
    - iron_redox
    - manganese_redox
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: soil, sediment, or water redox chemistry
      material_or_matrix: soil, sediment, or water
      value_type: NUMERIC
  salinity_condition:
    title: salinity condition
    description: Salinity or salinization treatment in freshwater and saltwater coastal TAI experiments.
    range: float
    unit:
      descriptive_name: practical salinity units
    exact_mappings:
    - MIXS:0000008
    aliases:
    - salinity
    - conductivity
    - salinization_treatment
    annotations:
      role: EXPERIMENTAL_FACTOR; COVARIATE
      measured_entity: water chemistry
      material_or_matrix: soil water or surface water
      value_type: NUMERIC
  sample_collection_date:
    title: sample collection date
    description: Date or timestamp for each field collection, sensor observation, or incubation sampling
      point.
    range: datetime
    exact_mappings:
    - MIXS:0000011
    slot_uri: MIXS:0000011
    aliases:
    - collection_date
    - timestamp
    - date
    annotations:
      role: DATE_TIME_VARIABLE; COVARIATE
      measured_entity: sampling event
      value_type: DATETIME
  terrestrial_aquatic_interface_position:
    title: terrestrial-aquatic interface position
    description: Position along the open-water, wetland, shoreline, and upland coastal gradient.
    range: TerrestrialAquaticInterfacePositionEnum
    exact_mappings:
    - MIXS:0000013
    - MIXS:0000008
    slot_uri: MIXS:0000013
    aliases:
    - transect_position
    - gradient_position
    - env_local_scale
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; SPATIAL_INDEX
      measured_entity: coastal gradient position
      value_type: CATEGORICAL
enums:
  CoastalStudyRegionEnum:
    permissible_values:
      Chesapeake Bay: null
      Western Lake Erie Basin: null
  TerrestrialAquaticInterfacePositionEnum:
    permissible_values:
      open water: null
      wetland: null
      shoreline: null
      upland forest: null
