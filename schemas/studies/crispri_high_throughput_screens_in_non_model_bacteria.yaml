id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/crispri_high_throughput_screens_in_non_model_bacteria
name: crispri_high_throughput_screens_in_non_model_bacteria
title: CRISPRi High-Throughput Screens in Non-Model Bacteria
description: Development of workflow for rapid enhancement of transformation efficiency and genetic part
  characterization in non-model bacteria for genome-wide CRISPRi screens. Tools being deployed in Bacillus
  velezensis for rhizosphere studies.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://w3id.org/gold.vocab/
  GOLDPATH: https://w3id.org/gold.path/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study crispri_high_throughput_screens_in_non_model_bacteria.
    slots:
    - non_model_bacterial_strain
    - transformation_workflow_condition
    - guide_rna_target
    - transformation_efficiency
    - crispri_screen_fitness_effect
slots:
  non_model_bacterial_strain:
    title: non-model bacterial strain
    description: Bacterial strain or chassis used for transformation optimization and CRISPRi screening.
    range: string
    aliases:
    - strain_id
    - chassis
    - organism
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; IDENTIFIER
      measured_entity: bacterial chassis
      value_type: IDENTIFIER
  transformation_workflow_condition:
    title: transformation workflow condition
    description: Protocol condition varied to enhance transformation efficiency.
    range: string
    aliases:
    - transformation_condition
    - protocol_condition
    - workflow_parameter
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: bacterial transformation workflow
      value_type: CATEGORICAL
  guide_rna_target:
    title: guide RNA target
    description: CRISPRi guide RNA and target gene represented in high-throughput screens.
    range: string
    aliases:
    - guide_id
    - guide_sequence
    - target_gene
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; IDENTIFIER
      measured_entity: CRISPRi perturbation
      value_type: IDENTIFIER
  transformation_efficiency:
    title: transformation efficiency
    description: Efficiency of DNA transformation under tested workflow conditions.
    range: float
    aliases:
    - transformation_efficiency
    - colony_count
    - transformants_per_microgram
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: bacterial transformation
      value_type: NUMERIC
  crispri_screen_fitness_effect:
    title: CRISPRi screen fitness effect
    description: Growth or fitness effect measured for CRISPRi perturbations in non-model bacteria.
    range: float
    aliases:
    - fitness_effect
    - guide_enrichment
    - screen_score
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE; DERIVED
      measured_entity: bacterial CRISPRi perturbation
      method: high-throughput CRISPRi screen
      value_type: NUMERIC
