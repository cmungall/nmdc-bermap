id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/multilayered_biocontainment_for_rhizosphere_deployment
name: multilayered_biocontainment_for_rhizosphere_deployment
title: Multilayered Biocontainment for Rhizosphere Deployment
description: Developing and testing multilayered containment strategies for engineered microbes including
  sequence entanglement, kill-switches, environmental-cue controls, and population-level coordination.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study multilayered_biocontainment_for_rhizosphere_deployment.
    slots:
    - engineered_microbial_strain
    - biocontainment_design
    - rhizosphere_deployment_context
    - containment_efficacy
    - containment_transcriptomic_response
slots:
  engineered_microbial_strain:
    title: engineered microbial strain
    description: Engineered environmental microbial strain or chassis carrying a containment design.
    range: string
    aliases:
    - strain_id
    - chassis
    - engineered_strain
    annotations:
      role: IDENTIFIER; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: engineered environmental microorganism
      value_type: IDENTIFIER
  biocontainment_design:
    title: biocontainment design
    description: Multilayered containment strategy including kill-switch or gene-overlap architecture.
    range: BiocontainmentDesignEnum
    aliases:
    - containment_design
    - kill_switch
    - sequence_entanglement
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: biocontainment circuit
      value_type: CATEGORICAL
  rhizosphere_deployment_context:
    title: rhizosphere deployment context
    description: Soil or rhizosphere environment used to test engineered microbe containment.
    range: string
    aliases:
    - deployment_context
    - environment
    - rhizosphere_context
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: deployment environment
      material_or_matrix: rhizosphere
      value_type: CATEGORICAL
  containment_efficacy:
    title: containment efficacy
    description: Performance of the containment design in limiting persistence or escape of engineered
      microbes.
    range: float
    aliases:
    - containment_efficacy
    - escape_frequency
    - survival_fraction
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: engineered microbial population
      method: containment assay
      value_type: NUMERIC
  containment_transcriptomic_response:
    title: containment transcriptomic response
    description: Gene expression response of engineered microbes carrying containment circuits.
    multivalued: true
    range: string
    aliases:
    - transcript_abundance
    - expression_profile
    - containment_response
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: engineered environmental microorganism
      method: transcriptomics
      value_type: ARRAY
enums:
  BiocontainmentDesignEnum:
    permissible_values:
      sequence entanglement: null
      kill-switch: null
      unnatural amino acid dependence: null
      chemical or light signaling control: null
      quorum sensing coordination: null
