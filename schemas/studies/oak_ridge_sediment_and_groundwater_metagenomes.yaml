id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/oak_ridge_sediment_and_groundwater_metagenomes
name: oak_ridge_sediment_and_groundwater_metagenomes
title: Oak Ridge Sediment and Groundwater Metagenomes
description: 26 subsurface sediment and 9 groundwater metagenomes from the Oak Ridge Reservation studying
  subsurface microbiome from centimeter to field scale.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study oak_ridge_sediment_and_groundwater_metagenomes.
    slots:
    - metagenome_assembled_genome
    - subsurface_microbial_community_composition
    - subsurface_sample_matrix
    - subsurface_spatial_scale
slots:
  metagenome_assembled_genome:
    title: metagenome-assembled genome
    description: Genome bins recovered from Oak Ridge sediment and groundwater metagenomes.
    multivalued: true
    range: string
    aliases:
    - mag_id
    - genome_bin
    - assembly_bin
    annotations:
      role: DERIVED; MEASURED_VARIABLE
      measured_entity: subsurface microbial genome
      method: metagenome assembly and binning
      value_type: ARRAY
  subsurface_microbial_community_composition:
    title: subsurface microbial community composition
    description: Taxonomic and functional profile derived from sediment and groundwater metagenomes.
    multivalued: true
    range: string
    aliases:
    - taxonomic_profile
    - functional_profile
    - metagenome_profile
    annotations:
      role: MEASURED_VARIABLE; STUDY_DESIGN_DEPENDENT_VARIABLE
      measured_entity: subsurface microbial community
      material_or_matrix: sediment and groundwater
      method: metagenomic sequencing
      value_type: ARRAY
  subsurface_sample_matrix:
    title: subsurface sample matrix
    description: Material type represented by each Oak Ridge metagenome sample.
    range: SubsurfaceSampleMatrixEnum
    exact_mappings:
    - MIXS:0000014
    - MIXS:0000008
    slot_uri: MIXS:0000014
    aliases:
    - sample_matrix
    - material
    - environmental_medium
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: subsurface sample matrix
      material_or_matrix: sediment and groundwater
      value_type: CATEGORICAL
  subsurface_spatial_scale:
    title: subsurface spatial scale
    description: Spatial grain or sampling scale represented by the metagenome sample.
    range: string
    exact_mappings:
    - MIXS:0000013
    slot_uri: MIXS:0000013
    aliases:
    - spatial_scale
    - sampling_scale
    - location
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      measured_entity: Oak Ridge subsurface sampling design
      spatial_resolution: centimeter to field scale
      value_type: CATEGORICAL
enums:
  SubsurfaceSampleMatrixEnum:
    permissible_values:
      sediment: null
      groundwater: null
