id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/populus_holobiont_niche_and_genotype_effects
name: populus_holobiont_niche_and_genotype_effects
title: Populus Holobiont Niche and Genotype Effects
description: Dissecting effects of plant niches and genotype on the Populus microbiome using 16S and ITS
  amplicon sequencing across multiple tissue types.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study populus_holobiont_niche_and_genotype_effects.
    slots:
    - plant_habitat_class
    - tissue_level_niche
    - populus_genotype
    - bacterial_archaeal_and_fungal_community_composition
slots:
  plant_habitat_class:
    title: plant habitat class
    description: Broad Populus habitat class used to organize niche-level microbiome comparisons.
    range: PlantHabitatClassEnum
    aliases:
    - habitat
    - plant_habitat
    - sample_type
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: Populus-associated microbial habitat
      value_type: CATEGORICAL
  tissue_level_niche:
    title: tissue-level niche
    description: Fine-scale tissue or niche sampled within Populus plants and associated soils.
    range: TissueLevelNicheEnum
    aliases:
    - niche
    - tissue
    - compartment
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: Populus tissue-level microbial habitat
      value_type: CATEGORICAL
  populus_genotype:
    title: Populus genotype
    description: Host genotype used to test genotype effects on Populus-associated microbial communities.
    range: string
    aliases:
    - genotype
    - host_genotype
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: Populus host plant
      value_type: CATEGORICAL
  bacterial_archaeal_and_fungal_community_composition:
    title: bacterial archaeal and fungal community composition
    description: 16S and ITS profiles used to compare microbial communities across Populus niches and
      genotypes.
    multivalued: true
    range: string
    aliases:
    - bacterial_archaeal_profile
    - fungal_community_profile
    - asv_table
    - otu_table
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: Populus-associated microbial community
      material_or_matrix: leaves, stems, roots, and soils
      method: 16S rRNA and ITS amplicon sequencing
      value_type: ARRAY
enums:
  PlantHabitatClassEnum:
    permissible_values:
      leaf:
        meaning: PO:0025034
      stem:
        meaning: PO:0009047
      root:
        meaning: PO:0009005
      soil:
        meaning: ENVO:00001998
  TissueLevelNicheEnum:
    permissible_values:
      approximately 30 tissue-level niches: null
