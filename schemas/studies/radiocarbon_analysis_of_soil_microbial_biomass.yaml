id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/radiocarbon_analysis_of_soil_microbial_biomass
name: radiocarbon_analysis_of_soil_microbial_biomass
title: Radiocarbon Analysis of Soil Microbial Biomass
description: Novel method for radiocarbon analysis of soil microbial biomass via direct chloroform extraction.
  Enables measurement of microbial C turnover.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://w3id.org/gold.vocab/
  GOLDPATH: https://w3id.org/gold.path/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study radiocarbon_analysis_of_soil_microbial_biomass.
    slots:
    - extraction_fraction
    - radiocarbon_content
    - microbial_biomass_carbon
    - microbial_carbon_turnover_estimate
slots:
  extraction_fraction:
    title: extraction fraction
    description: Soil microbial biomass fraction or extract produced by the direct chloroform extraction
      method.
    range: string
    aliases:
    - extraction_fraction
    - fraction
    - chloroform_extract
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: soil microbial biomass extract
      material_or_matrix: soil
      value_type: CATEGORICAL
  radiocarbon_content:
    title: radiocarbon content
    description: Radiocarbon measurement of soil microbial biomass carbon.
    range: float
    aliases:
    - radiocarbon
    - delta14C
    - fraction_modern
    annotations:
      role: MEASURED_VARIABLE; STUDY_DESIGN_DEPENDENT_VARIABLE
      measured_entity: microbial biomass carbon
      material_or_matrix: soil
      method: radiocarbon analysis
      value_type: NUMERIC
  microbial_biomass_carbon:
    title: microbial biomass carbon
    description: Soil microbial biomass carbon amount measured from the extracted fraction.
    range: float
    unit:
      descriptive_name: microgram per gram
      ucum_code: ug/g
    aliases:
    - microbial_biomass_carbon
    - biomass_C
    - extracted_carbon
    annotations:
      role: MEASURED_VARIABLE; STUDY_DESIGN_DEPENDENT_VARIABLE
      measured_entity: soil microbial biomass
      material_or_matrix: soil
      method: direct chloroform extraction
      notes: BERVO has a generic microbial biomass chemical element term but no carbon-specific microbial
        biomass term.
      value_type: NUMERIC
  microbial_carbon_turnover_estimate:
    title: microbial carbon turnover estimate
    description: Inferred microbial carbon turnover enabled by radiocarbon analysis of microbial biomass.
    range: float
    aliases:
    - turnover_estimate
    - carbon_turnover
    - microbial_C_turnover
    annotations:
      role: DERIVED; STUDY_DESIGN_DEPENDENT_VARIABLE
      measured_entity: soil microbial carbon turnover
      method: radiocarbon-based turnover inference
      value_type: NUMERIC
