id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/reduced_complexity_consortia_from_brachypodium_rhizosphere
name: reduced_complexity_consortia_from_brachypodium_rhizosphere
title: Reduced Complexity Consortia from Brachypodium Rhizosphere
description: Systematic framework to generate Reduced Complexity Consortia (RCC) representing Brachypodium
  rhizosphere microbiome for sustainable agriculture applications. Inoculum from Angelo Coast Range Reserve
  soil.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study reduced_complexity_consortia_from_brachypodium_rhizosphere.
    slots:
    - consortium_stability
    - enrichment_generation
    - inoculum_source
    - reduced_consortium_composition
slots:
  consortium_stability:
    title: consortium stability
    description: Stability or reproducibility of consortium composition and function across transfers
      or replicates.
    range: float
    aliases:
    - stability_metric
    - community_stability
    - compositional_reproducibility
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; DERIVED
      measured_entity: reduced complexity consortium
      value_type: NUMERIC
  enrichment_generation:
    title: enrichment generation
    description: Transfer or enrichment stage used to derive reduced complexity consortia.
    range: integer
    exact_mappings:
    - MIXS:0000008
    aliases:
    - enrichment_generation
    - transfer_number
    - passage
    annotations:
      role: DATE_TIME_VARIABLE; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: reduced complexity consortium enrichment
      value_type: INTEGER
  inoculum_source:
    title: inoculum source
    description: Brachypodium rhizosphere or Angelo Coast Range Reserve soil source used to initiate the
      reduced complexity consortium.
    range: string
    exact_mappings:
    - MIXS:0000013
    - MIXS:0000014
    - MIXS:0000008
    slot_uri: MIXS:0000013
    aliases:
    - inoculum_source
    - source_soil
    - source_rhizosphere
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: consortium inoculum
      material_or_matrix: rhizosphere soil
      value_type: CATEGORICAL
  reduced_consortium_composition:
    title: reduced consortium composition
    description: Microbial composition of the reduced complexity consortium after enrichment.
    multivalued: true
    range: string
    aliases:
    - consortium_composition
    - asv_table
    - metagenome_profile
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: reduced complexity microbial consortium
      method: amplicon sequencing and metagenomics
      value_type: ARRAY
