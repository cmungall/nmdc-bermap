id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/s_elongatus_pcc_7942_circadian_control_proteomics
name: s_elongatus_pcc_7942_circadian_control_proteomics
title: S. elongatus PCC 7942 Circadian Control Proteomics
description: Proteomics analysis of circadian regulation in Synechococcus elongatus PCC 7942. Supports
  understanding of how circadian rhythms affect cyanobacterial metabolism.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study s_elongatus_pcc_7942_circadian_control_proteomics.
    slots:
    - circadian_phase
    - circadian_protein_abundance
    - circadian_regulatory_pathway
    - protein_identifier
slots:
  circadian_phase:
    title: circadian phase
    description: Circadian phase or sampling time used to study control of cyanobacterial protein abundance.
    range: string
    exact_mappings:
    - MIXS:0000008
    aliases:
    - circadian_phase
    - time_point
    - sampling_time
    annotations:
      role: DATE_TIME_VARIABLE; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: cyanobacterial culture sampling event
      value_type: CATEGORICAL
  circadian_protein_abundance:
    title: circadian protein abundance
    description: Protein abundance measured across circadian phases or time points.
    range: float
    aliases:
    - protein_abundance
    - peptide_abundance
    - intensity
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: cyanobacterial protein
      method: mass spectrometry proteomics
      value_type: NUMERIC
  circadian_regulatory_pathway:
    title: circadian regulatory pathway
    description: Functional or regulatory pathway assignment for proteins involved in circadian control.
    range: string
    aliases:
    - circadian_pathway
    - regulatory_pathway
    - functional_annotation
    annotations:
      role: DERIVED; GROUPING
      measured_entity: cyanobacterial circadian regulation
      method: protein functional annotation
      value_type: CATEGORICAL
  protein_identifier:
    title: protein identifier
    description: Protein or peptide feature identified in circadian-control proteomics.
    range: string
    aliases:
    - protein_id
    - peptide_id
    - feature_id
    annotations:
      role: IDENTIFIER
      measured_entity: Synechococcus elongatus protein
      value_type: IDENTIFIER
