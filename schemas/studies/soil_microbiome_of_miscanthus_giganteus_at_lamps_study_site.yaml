id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/soil_microbiome_of_miscanthus_giganteus_at_lamps_study_site
name: soil_microbiome_of_miscanthus_giganteus_at_lamps_study_site
title: Soil Microbiome of Miscanthus × giganteus at LAMPS Study Site
description: SSU rRNA RNA library of soil microbiome at LAMPS. Complements DNA-based study examining total
  vs metabolically active microbial communities under nitrogen fertilization.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study soil_microbiome_of_miscanthus_giganteus_at_lamps_study_site.
    slots:
    - nitrogen_fertilization
    - nucleic_acid_fraction
    - active_soil_microbiome_composition
slots:
  nitrogen_fertilization:
    title: nitrogen fertilization
    description: Nitrogen fertilizer treatment applied to Miscanthus plots.
    range: string
    aliases:
    - nitrogen_fertilization
    - n_treatment
    - fertilizer_regimen
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: Miscanthus field plot
      value_type: CATEGORICAL
  nucleic_acid_fraction:
    title: nucleic acid fraction
    description: Fraction distinguishing total DNA-based community signal from metabolically active RNA-based
      signal.
    range: NucleicAcidFractionEnum
    aliases:
    - nucleic_acid_fraction
    - dna_rna_fraction
    - library_type
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      value_type: CATEGORICAL
  active_soil_microbiome_composition:
    title: active soil microbiome composition
    description: SSU rRNA profile representing metabolically active soil microbial communities.
    multivalued: true
    range: string
    aliases:
    - ssu_rna_profile
    - asv_table
    - active_community_profile
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: soil microbial community
      material_or_matrix: soil
      method: SSU rRNA amplicon sequencing
      value_type: ARRAY
enums:
  NucleicAcidFractionEnum:
    permissible_values:
      total community: null
      metabolically active community: null
