id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/soil_microbiome_response_to_depth_irrigation_and_plant_genotype
name: soil_microbiome_response_to_depth_irrigation_and_plant_genotype
title: Soil Microbiome Response to Depth, Irrigation and Plant Genotype
description: Influence of soil depth, irrigation, and plant genotype on the soil microbiome, metaphenome,
  and carbon chemistry. Multi-omics study published in mBio 2023.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://w3id.org/gold.vocab/
  GOLDPATH: https://w3id.org/gold.path/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study soil_microbiome_response_to_depth_irrigation_and_plant_genotype.
    slots:
    - soil_depth
    - irrigation_treatment
    - plant_genotype
    - soil_microbiome_composition
    - metabolite_and_protein_feature_abundances
slots:
  soil_depth:
    title: soil depth
    description: Sampling depth below the soil surface.
    range: float
    unit:
      descriptive_name: centimeter
      ucum_code: cm
    aliases:
    - depth
    - soil_depth
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; SPATIAL_INDEX
      measured_entity: soil profile
      material_or_matrix: soil
      value_type: NUMERIC
  irrigation_treatment:
    title: irrigation treatment
    description: Watering or irrigation condition applied to the soil and plant system.
    range: string
    aliases:
    - irrigation
    - irrigation_treatment
    - watering_regimen
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: soil-plant system
      value_type: CATEGORICAL
  plant_genotype:
    title: plant genotype
    description: Host plant genotype associated with each soil multi-omics sample.
    range: string
    aliases:
    - plant_genotype
    - host_genotype
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: host plant
      value_type: CATEGORICAL
  soil_microbiome_composition:
    title: soil microbiome composition
    description: Metagenome-derived microbial community composition across depth, irrigation, and genotype
      treatments.
    multivalued: true
    range: string
    aliases:
    - metagenome_profile
    - taxonomic_profile
    - functional_profile
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: soil microbial community
      material_or_matrix: soil
      method: metagenomics
      value_type: ARRAY
  metabolite_and_protein_feature_abundances:
    title: metabolite and protein feature abundances
    description: Metabolomic and proteomic feature abundances measured from the same soil system.
    multivalued: true
    range: string
    aliases:
    - metabolite_abundance
    - protein_abundance
    - metaphenome_features
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: soil metaphenome
      material_or_matrix: soil
      method: metabolomics and proteomics
      value_type: ARRAY
