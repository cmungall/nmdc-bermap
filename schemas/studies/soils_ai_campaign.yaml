id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/soils_ai_campaign
name: soils_ai_campaign
title: SOILS-AI Campaign
description: Soil Organic Indicators at Large Scale for Artificial Intelligence campaign targeting ten
  underrepresented soil orders to strengthen AI models for soil carbon dynamics. Applies pedotransfer
  functions to upscale measurements to continental scales.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study soils_ai_campaign.
    slots:
    - ai_model_feature_set
    - pedotransfer_function_output
    - soil_order
    - soil_organic_carbon_indicator
    - standardized_sampling_protocol
slots:
  ai_model_feature_set:
    title: AI model feature set
    description: Integrated feature set used to train or strengthen AI models for soil carbon dynamics.
    multivalued: true
    range: string
    aliases:
    - model_feature
    - feature_set
    - AI_ready_feature
    annotations:
      role: DERIVED; STUDY_DESIGN_DEPENDENT_VARIABLE
      measured_entity: AI-ready soil dataset
      method: feature engineering from MONet molecular, microstructural, and biogeochemical measurements
      value_type: ARRAY
  pedotransfer_function_output:
    title: pedotransfer function output
    description: Upscaled soil property estimate generated by pedotransfer functions.
    range: float
    aliases:
    - pedotransfer_output
    - upscaled_estimate
    - soil_property_prediction
    annotations:
      role: DERIVED; STUDY_DESIGN_DEPENDENT_VARIABLE
      measured_entity: continental-scale soil carbon dynamics estimate
      method: pedotransfer function
      value_type: NUMERIC
  soil_order:
    title: soil order
    description: Targeted underrepresented soil order represented by a SOILS-AI sample.
    range: SoilOrderEnum
    exact_mappings:
    - MIXS:0000008
    aliases:
    - soil_order
    - taxonomy
    - soil_class
    annotations:
      role: GROUPING; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: soil taxonomic class
      value_type: CATEGORICAL
  soil_organic_carbon_indicator:
    title: soil organic carbon indicator
    description: Soil organic indicator used as an AI feature or target for soil carbon dynamics modeling.
    range: float
    aliases:
    - soil_organic_carbon
    - carbon_indicator
    - organic_indicator
    annotations:
      role: MEASURED_VARIABLE; STUDY_DESIGN_DEPENDENT_VARIABLE
      measured_entity: soil organic carbon
      material_or_matrix: soil
      value_type: NUMERIC
  standardized_sampling_protocol:
    title: standardized sampling protocol
    description: MONet or SOILS-AI sampling protocol applied to generate AI-ready soil data.
    range: string
    aliases:
    - sampling_protocol
    - protocol
    - workflow
    annotations:
      role: STUDY_DESIGN_CONTROLLED_VARIABLE
      measured_entity: soil sampling workflow
      value_type: CATEGORICAL
enums:
  SoilOrderEnum:
    permissible_values:
      ten underrepresented soil orders: null
