id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/solvent_disruption_of_biomass_and_biomembrane_structures
name: solvent_disruption_of_biomass_and_biomembrane_structures
title: Solvent Disruption of Biomass and Biomembrane Structures
description: Integrated experimental and computational study of amphiphilic co-solvent effects on lignocellulosic
  biomass, plant cell-wall polymers, and microbial membrane lipid bilayers.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study solvent_disruption_of_biomass_and_biomembrane_structures.
    slots:
    - amphiphilic_solvent_identity
    - biomass_deconstruction_performance
    - biomass_or_biomembrane_substrate
    - biomolecular_assembly_structure
    - microbial_solvent_tolerance
    - solvent_concentration
slots:
  amphiphilic_solvent_identity:
    title: amphiphilic solvent identity
    description: Solvent or co-solvent used to disrupt biomass or biomembrane assemblies.
    range: AmphiphilicSolventIdentityEnum
    exact_mappings:
    - MIXS:0000008
    aliases:
    - solvent
    - cosolvent
    - solvent_identity
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: solvent treatment
      value_type: CATEGORICAL
  biomass_deconstruction_performance:
    title: biomass deconstruction performance
    description: Pretreatment effectiveness measured as biomass disruption, fractionation, or sugar release.
    range: float
    aliases:
    - deconstruction_yield
    - sugar_release
    - lignin_solubilization
    - fractionation_efficiency
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: lignocellulosic biomass
      value_type: NUMERIC
  biomass_or_biomembrane_substrate:
    title: biomass or biomembrane substrate
    description: Plant biomass, cell-wall polymer, or microbial membrane system exposed to solvent.
    range: BiomassOrBiomembraneSubstrateEnum
    exact_mappings:
    - MIXS:0000008
    aliases:
    - substrate
    - biomass_type
    - membrane_system
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: biomass or biomembrane substrate
      value_type: CATEGORICAL
  biomolecular_assembly_structure:
    title: biomolecular assembly structure
    description: Structural state of biomass polymers or lipid bilayers measured after solvent exposure.
    multivalued: true
    range: string
    aliases:
    - scattering_profile
    - nmr_spectrum
    - membrane_order_parameter
    - cellulose_fibril_spacing
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: plant cell-wall or biomembrane assembly
      method: neutron scattering, NMR spectroscopy, microscopy, or molecular dynamics
      value_type: ARRAY
  microbial_solvent_tolerance:
    title: microbial solvent tolerance
    description: Microbial growth, membrane stability, or viability under solvent exposure.
    range: float
    aliases:
    - growth_rate
    - viability
    - membrane_integrity
    - solvent_tolerance
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: fermenting microbial cell
      material_or_matrix: microbial culture
      value_type: NUMERIC
  solvent_concentration:
    title: solvent concentration
    description: Concentration or fraction of solvent used in pretreatment, membrane exposure, or simulation.
    range: float
    exact_mappings:
    - MIXS:0000008
    aliases:
    - solvent_concentration
    - cosolvent_fraction
    - solvent_loading
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: solvent treatment
      value_type: NUMERIC
enums:
  AmphiphilicSolventIdentityEnum:
    permissible_values:
      ethanol:
        meaning: CHEBI:16236
      butanol: null
      tetrahydrofuran: null
      dimethyl isosorbide: null
      deep eutectic solvent: null
  BiomassOrBiomembraneSubstrateEnum:
    permissible_values:
      cellulose: null
      lignin:
        meaning: CHEBI:6457
      switchgrass biomass: null
      microbial lipid bilayer: null
