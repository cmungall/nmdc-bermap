id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/sorghum_colletotrichum_dual_rna_seq
name: sorghum_colletotrichum_dual_rna_seq
title: Sorghum-Colletotrichum Dual RNA-seq
description: Dual-RNA-sequencing to elucidate the interactions between sorghum and Colletotrichum sublineola
  during infection.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study sorghum_colletotrichum_dual_rna_seq.
    slots:
    - infection_time_point
    - interaction_partner
    - infection_treatment
    - host_and_pathogen_transcript_abundance
slots:
  infection_time_point:
    title: infection time point
    description: Time point or infection stage sampled for dual RNA-seq.
    range: string
    aliases:
    - infection_time
    - time_point
    - infection_stage
    annotations:
      role: DATE_TIME_VARIABLE; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: sorghum infection sampling event
      time_series: 'true'
      value_type: CATEGORICAL
  interaction_partner:
    title: interaction partner
    description: Organism whose transcriptome is represented in the dual RNA-seq profile.
    range: InteractionPartnerEnum
    aliases:
    - organism
    - partner
    - transcript_source
    annotations:
      role: GROUPING; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: plant-pathogen interaction partner
      value_type: CATEGORICAL
  infection_treatment:
    title: infection treatment
    description: Sorghum infection condition or pathogen challenge status.
    range: string
    aliases:
    - infection_treatment
    - pathogen_challenge
    - inoculation_status
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: sorghum plant tissue
      value_type: CATEGORICAL
  host_and_pathogen_transcript_abundance:
    title: host and pathogen transcript abundance
    description: Dual RNA-seq expression profile for sorghum and Colletotrichum transcripts during infection.
    multivalued: true
    range: string
    aliases:
    - host_transcript_abundance
    - pathogen_transcript_abundance
    - dual_RNAseq_counts
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: sorghum-Colletotrichum interaction transcriptome
      method: dual RNA-seq
      value_type: ARRAY
enums:
  InteractionPartnerEnum:
    permissible_values:
      Sorghum bicolor:
        meaning: NCBITaxon:4558
      Colletotrichum sublineola:
        meaning: NCBITaxon:1173701
