id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/sorghum_rhizosphere_nitrification_study
name: sorghum_rhizosphere_nitrification_study
title: Sorghum Rhizosphere Nitrification Study
description: Intra- and inter-annual variability of nitrification in the rhizosphere of field-grown bioenergy
  sorghum, examining biological nitrification inhibition (BNI) potential and soil microbial communities
  across fertilizer treatments.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study sorghum_rhizosphere_nitrification_study.
    slots:
    - fertilizer_treatment
    - nitrification_activity
    - rhizosphere_microbial_community_composition
    - sampling_year
slots:
  fertilizer_treatment:
    title: fertilizer treatment
    description: Fertilizer treatment condition applied to field-grown bioenergy sorghum.
    range: string
    exact_mappings:
    - MIXS:0000556
    - MIXS:0000008
    - BERVO:0000895
    slot_uri: MIXS:0000556
    aliases:
    - fertilizer_treatment
    - n_treatment
    - fertilizer_regimen
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: sorghum field plot
      value_type: CATEGORICAL
  nitrification_activity:
    title: nitrification activity
    description: Rhizosphere nitrification response used to evaluate biological nitrification inhibition
      potential.
    range: float
    exact_mappings:
    - BERVO:0000871
    slot_uri: BERVO:0000871
    aliases:
    - nitrification_rate
    - potential_nitrification_rate
    - bni_activity
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: nitrification process
      material_or_matrix: rhizosphere soil
      method: soil nitrogen transformation assay
      value_type: NUMERIC
  rhizosphere_microbial_community_composition:
    title: rhizosphere microbial community composition
    description: Amplicon-derived microbial community profile for sorghum rhizosphere samples.
    multivalued: true
    range: string
    exact_mappings:
    - MIXS:0000014
    slot_uri: MIXS:0000014
    aliases:
    - asv_table
    - otu_table
    - bacterial_community_profile
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: sorghum rhizosphere microbial community
      material_or_matrix: rhizosphere soil
      method: 16S rRNA amplicon sequencing
      value_type: ARRAY
  sampling_year:
    title: sampling year
    description: Field season used to evaluate inter-annual variability in rhizosphere nitrification.
    range: integer
    exact_mappings:
    - MIXS:0000011
    - MIXS:0000008
    slot_uri: MIXS:0000011
    aliases:
    - year
    - sampling_year
    - collection_date
    annotations:
      role: DATE_TIME_VARIABLE; STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: sampling event
      temporal_resolution: annual and within-season sampling
      value_type: INTEGER
