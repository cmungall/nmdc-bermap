id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/sty-11-076c9980
name: microbial_carbon_transformations_in_wet_tropical_soils
title: Microbial Carbon Transformations in Wet Tropical Soils
description: Lab enrichment of tropical soil microbial communities from Luquillo Experimental Forest,
  Puerto Rico, examining effects of redox fluctuation on microbial ecophysiology.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study sty-11-076c9980.
    slots:
    - broad_scale_environmental_context
    - collection_date
    - community
    - ecosystem
    - ecosystem_category
    - ecosystem_subtype
    - ecosystem_type
    - environmental_medium
    - geographic_location_name
    - habitat
    - latitude_and_longitude
    - local_environmental_context
    - microbial_carbon_transformation_profile
    - microbial_ecophysiology_trait
    - redox_fluctuation_treatment
    - sample_collection_site
    - soil_sampling_depth
    - specific_ecosystem
    - tropical_soil_source
slots:
  broad_scale_environmental_context:
    title: broad-scale environmental context
    description: Broad-scale environmental context recorded for the NMDC biosample.
    range: uriorcurie
    exact_mappings:
    - MIXS:0000012
    slot_uri: MIXS:0000012
    aliases:
    - env_broad_scale
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  collection_date:
    title: collection date
    description: Date when the NMDC biosample was collected.
    range: datetime
    exact_mappings:
    - MIXS:0000011
    slot_uri: MIXS:0000011
    aliases:
    - collection_date
    annotations:
      role: DATE_TIME_VARIABLE; COVARIATE
      value_type: DATETIME
  community:
    description: Ecological community descriptor recorded for the NMDC biosample.
    range: string
    aliases:
    - community
    annotations:
      role: COVARIATE; GROUPING
      value_type: TEXT
  ecosystem:
    description: GOLD ecosystem classification recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_category:
    title: ecosystem category
    description: GOLD ecosystem category recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_category
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_subtype:
    title: ecosystem subtype
    description: GOLD ecosystem subtype recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_subtype
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_type:
    title: ecosystem type
    description: GOLD ecosystem type recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_type
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  environmental_medium:
    title: environmental medium
    description: Environmental medium or material sampled for the NMDC biosample.
    range: uriorcurie
    exact_mappings:
    - MIXS:0000014
    slot_uri: MIXS:0000014
    aliases:
    - env_medium
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  geographic_location_name:
    title: geographic location name
    description: Geographic location name recorded for the NMDC biosample.
    range: string
    aliases:
    - geo_loc_name
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  habitat:
    description: Habitat descriptor recorded for the NMDC biosample.
    range: string
    aliases:
    - habitat
    annotations:
      role: COVARIATE; GROUPING
      value_type: TEXT
  latitude_and_longitude:
    title: latitude and longitude
    description: Latitude and longitude coordinates recorded for the NMDC biosample.
    range: string
    aliases:
    - lat_lon
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  local_environmental_context:
    title: local environmental context
    description: Local environmental context recorded for the NMDC biosample.
    range: uriorcurie
    exact_mappings:
    - MIXS:0000013
    slot_uri: MIXS:0000013
    aliases:
    - env_local_scale
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  microbial_carbon_transformation_profile:
    title: microbial carbon transformation profile
    description: Microbial transformation of soil carbon under wet tropical redox fluctuation conditions.
    multivalued: true
    range: string
    aliases:
    - carbon_transformation_profile
    - carbon_turnover
    - metabolite_profile
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE; DERIVED
      measured_entity: soil carbon transformation process
      material_or_matrix: tropical soil
      method: enrichment culture multi-omics or biogeochemical profiling
      value_type: ARRAY
  microbial_ecophysiology_trait:
    title: microbial ecophysiology trait
    description: Community or genome-resolved ecophysiological trait inferred for tropical soil microbes.
    multivalued: true
    range: string
    aliases:
    - ecophysiology_trait
    - microbial_trait
    - genome_trait
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; DERIVED
      measured_entity: tropical soil microbial community
      value_type: ARRAY
  redox_fluctuation_treatment:
    title: redox fluctuation treatment
    description: Oxic-anoxic or redox fluctuation condition applied to tropical soil enrichments.
    range: string
    exact_mappings:
    - MIXS:0000754
    - MIXS:0000008
    slot_uri: MIXS:0000754
    aliases:
    - redox_treatment
    - redox_fluctuation
    - perturbation
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: tropical soil enrichment
      value_type: CATEGORICAL
  sample_collection_site:
    title: sample collection site
    description: Sample collection site descriptor recorded for the NMDC biosample.
    range: string
    aliases:
    - sample_collection_site
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  soil_sampling_depth:
    title: soil sampling depth
    description: Soil depth recorded in NMDC biosample metadata for Luquillo tropical soil samples.
    range: float
    unit:
      descriptive_name: meter
      ucum_code: m
    exact_mappings:
    - MIXS:0000018
    slot_uri: MIXS:0000018
    aliases:
    - depth
    - soil_depth
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      measured_entity: tropical soil sampling interval
      material_or_matrix: soil
      value_type: NUMERIC
  specific_ecosystem:
    title: specific ecosystem
    description: Specific GOLD ecosystem classification recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - specific_ecosystem
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  tropical_soil_source:
    title: tropical soil source
    description: Luquillo Experimental Forest soil source represented in the enrichment experiment.
    range: string
    exact_mappings:
    - MIXS:0000013
    - MIXS:0000014
    slot_uri: MIXS:0000013
    aliases:
    - soil_source
    - field_site
    - location
    annotations:
      role: SPATIAL_INDEX; GROUPING
      measured_entity: tropical soil source location
      material_or_matrix: soil
      value_type: CATEGORICAL
