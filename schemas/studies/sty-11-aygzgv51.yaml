id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/sty-11-aygzgv51
name: riverbed_sediment_microbial_communities_from_the_columbia_river
title: Riverbed Sediment Microbial Communities from the Columbia River
description: Molecular-scale processes governing biogeochemical function of subsurface groundwater-surface
  water mixing zones (hyporheic zone). Columbia River samples from areas with varied vegetation density
  for studying biogeochemical hotspots.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://w3id.org/gold.vocab/
  GOLDPATH: https://w3id.org/gold.path/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study sty-11-aygzgv51.
    slots:
    - vegetation_density
    - sediment_sampling_depth
    - sampling_time_point
    - nitrogen_cycling_gene_abundance
    - multi_omics_profile
    - geographic_location_name
    - latitude_and_longitude
    - broad_scale_environmental_context
    - local_environmental_context
    - environmental_medium
    - ecosystem
    - ecosystem_category
    - ecosystem_type
    - ecosystem_subtype
    - specific_ecosystem
    - habitat
    - sampling_location
    - sample_collection_site
    - community
slots:
  vegetation_density:
    title: vegetation density
    description: Riparian vegetation density associated with the riverbed sediment sampling location.
    range: string
    aliases:
    - vegetation_density
    - vegetation_cover
    - riparian_vegetation_density
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; COVARIATE; GROUPING
      measured_entity: river corridor sampling location
      value_type: CATEGORICAL
  sediment_sampling_depth:
    title: sediment sampling depth
    description: Depth value recorded in NMDC biosample metadata for Columbia River riverbed sediment
      samples.
    range: float
    unit:
      descriptive_name: meter
      ucum_code: m
    aliases:
    - depth
    - sediment_depth
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      measured_entity: riverbed sediment sampling interval
      material_or_matrix: riverbed sediment
      value_type: NUMERIC
  sampling_time_point:
    title: sampling time point
    description: Temporal sampling point for nitrogen-cycling gene diversity profiles.
    range: datetime
    aliases:
    - collection_date
    - sampling_date
    - time_point
    annotations:
      role: DATE_TIME_VARIABLE; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: sampling event
      time_series: 'true'
      value_type: DATETIME
  nitrogen_cycling_gene_abundance:
    title: nitrogen cycling gene abundance
    description: Abundance or diversity profile for nitrogen-cycling genes in hyporheic microbiomes.
    multivalued: true
    range: string
    aliases:
    - nitrogen_cycling_gene_abundance
    - functional_gene_profile
    - gene_abundance
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: nitrogen cycling genes
      material_or_matrix: riverbed sediment
      method: metagenomics
      value_type: ARRAY
  multi_omics_profile:
    title: multi-omics profile
    description: Integrated metagenomic, metabolomic, and proteomic profiles from hyporheic zone sediment.
    range: string
    aliases:
    - metagenome_profile
    - metabolome_profile
    - proteome_profile
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: hyporheic microbiome
      material_or_matrix: riverbed sediment
      method: metagenomics, metabolomics, and proteomics
      value_type: OBJECT
  geographic_location_name:
    title: geographic location name
    description: Geographic location name recorded for the NMDC biosample.
    range: string
    aliases:
    - geo_loc_name
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  latitude_and_longitude:
    title: latitude and longitude
    description: Latitude and longitude coordinates recorded for the NMDC biosample.
    range: string
    aliases:
    - lat_lon
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  broad_scale_environmental_context:
    title: broad-scale environmental context
    description: Broad-scale environmental context recorded for the NMDC biosample.
    range: uriorcurie
    aliases:
    - env_broad_scale
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  local_environmental_context:
    title: local environmental context
    description: Local environmental context recorded for the NMDC biosample.
    range: uriorcurie
    aliases:
    - env_local_scale
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  environmental_medium:
    title: environmental medium
    description: Environmental medium or material sampled for the NMDC biosample.
    range: uriorcurie
    aliases:
    - env_medium
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  ecosystem:
    description: GOLD ecosystem classification recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_category:
    title: ecosystem category
    description: GOLD ecosystem category recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_category
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_type:
    title: ecosystem type
    description: GOLD ecosystem type recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_type
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_subtype:
    title: ecosystem subtype
    description: GOLD ecosystem subtype recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_subtype
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  specific_ecosystem:
    title: specific ecosystem
    description: Specific GOLD ecosystem classification recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - specific_ecosystem
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  habitat:
    description: Habitat descriptor recorded for the NMDC biosample.
    range: string
    aliases:
    - habitat
    annotations:
      role: COVARIATE; GROUPING
      value_type: TEXT
  sampling_location:
    title: sampling location
    description: Sampling location descriptor recorded for the NMDC biosample.
    range: string
    aliases:
    - location
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  sample_collection_site:
    title: sample collection site
    description: Sample collection site descriptor recorded for the NMDC biosample.
    range: string
    aliases:
    - sample_collection_site
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  community:
    description: Ecological community descriptor recorded for the NMDC biosample.
    range: string
    aliases:
    - community
    annotations:
      role: COVARIATE; GROUPING
      value_type: TEXT
