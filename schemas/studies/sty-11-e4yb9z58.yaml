id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/sty-11-e4yb9z58
name: seasonal_activities_of_the_phyllosphere_microbiome_of_perennial_crops
title: Seasonal activities of the phyllosphere microbiome of perennial crops
description: Genome-centric approach to identify ecologically important leaf microbiome members on switchgrass
  and miscanthus, quantifying activities over two growing seasons. Classes represented by MAGs (Actinomycetia,
  Alpha- and Gamma-Proteobacteria, Bacteroidota) are active in late season with stress-associated pathways
  and biosynthetic pathways for terpenes and non-ribosomal peptides.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://w3id.org/gold.vocab/
  GOLDPATH: https://w3id.org/gold.path/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study sty-11-e4yb9z58.
    slots:
    - sampling_season
    - host_crop
    - phyllosphere_transcript_activity
    - air_temperature
    - sample_carbon_to_nitrogen_ratio
    - sample_total_nitrogen_content
    - collection_date
    - geographic_location_name
    - latitude_and_longitude
    - elevation
    - broad_scale_environmental_context
    - local_environmental_context
    - environmental_medium
    - environmental_package
    - ecosystem
    - ecosystem_category
    - ecosystem_type
    - ecosystem_subtype
    - specific_ecosystem
    - growth_facility
    - fertilizer_regimen
    - host_common_name
    - host_dry_mass
    - host_height
    - humidity
    - photon_flux
