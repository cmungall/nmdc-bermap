slots:
  sampling_season:
    title: sampling season
    description: Seasonal sampling point for phyllosphere microbiome activity measurements.
    range: SamplingSeasonEnum
    aliases:
    - season
    - sampling_date
    annotations:
      role: DATE_TIME_VARIABLE; STUDY_DESIGN_INDEPENDENT_VARIABLE
      temporal_resolution: seasonal sampling over two growing seasons
      time_series: 'true'
      value_type: CATEGORICAL
  host_crop:
    title: host crop
    description: Perennial bioenergy crop host sampled for phyllosphere community profiling.
    range: HostCropEnum
    aliases:
    - host_species
    - crop
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: perennial bioenergy crop
      material_or_matrix: leaf phyllosphere
      value_type: CATEGORICAL
  phyllosphere_transcript_activity:
    title: phyllosphere transcript activity
    description: Microbial transcript abundance profiles used to infer seasonal activity of phyllosphere
      taxa.
    multivalued: true
    range: string
    aliases:
    - transcript_abundance
    - gene_expression_profile
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: phyllosphere microbial community
      material_or_matrix: leaf phyllosphere
      method: metatranscriptomics
      temporal_resolution: seasonal sampling over two growing seasons
      time_series: 'true'
      value_type: ARRAY
  air_temperature:
    title: air temperature
    description: Average air temperature recorded in NMDC biosample metadata for the phyllosphere sampling
      event.
    range: float
    unit:
      descriptive_name: degree Celsius
      ucum_code: Cel
    aliases:
    - avg_temp
    - air_temperature
    annotations:
      role: COVARIATE; MEASURED_VARIABLE
      measured_entity: phyllosphere air environment
      material_or_matrix: air
      value_type: NUMERIC
  sample_carbon_to_nitrogen_ratio:
    title: sample carbon to nitrogen ratio
    description: Carbon-to-nitrogen ratio recorded for phyllosphere samples in NMDC biosample metadata.
    range: float
    unit:
      descriptive_name: dimensionless
      ucum_code: '1'
    aliases:
    - carb_nitro_ratio
    - c_n_ratio
    annotations:
      role: COVARIATE; MEASURED_VARIABLE
      measured_entity: phyllosphere sample chemistry
      material_or_matrix: leaf phyllosphere
      value_type: NUMERIC
  sample_total_nitrogen_content:
    title: sample total nitrogen content
    description: Total nitrogen content recorded for phyllosphere samples in NMDC biosample metadata.
    range: float
    unit:
      descriptive_name: percent
      ucum_code: '%'
    aliases:
    - tot_nitro_content
    - total_nitrogen
    annotations:
      role: COVARIATE; MEASURED_VARIABLE
      measured_entity: phyllosphere sample chemistry
      material_or_matrix: leaf phyllosphere
      value_type: NUMERIC
  collection_date:
    title: collection date
    description: Date when the NMDC biosample was collected.
    range: datetime
    aliases:
    - collection_date
    annotations:
      role: DATE_TIME_VARIABLE; COVARIATE
      value_type: DATETIME
  geographic_location_name:
    title: geographic location name
    description: Geographic location name recorded for the NMDC biosample.
    range: string
    aliases:
    - geo_loc_name
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  latitude_and_longitude:
    title: latitude and longitude
