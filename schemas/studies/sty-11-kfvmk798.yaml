id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/sty-11-kfvmk798
name: chronic_drought_differentially_alters_the_belowground_microbiome_of_populus_trichocarpa
title: Chronic drought differentially alters the belowground microbiome of Populus trichocarpa
description: Assessment of archaeal/bacterial and fungal communities within root endosphere, rhizosphere,
  and bulk soil of P. trichocarpa genotypes under drought in Boardman, OR.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study sty-11-kfvmk798.
    slots:
    - belowground_compartment
    - belowground_microbial_community_composition
    - broad_scale_environmental_context
    - collection_date
    - drought_treatment
    - elevation
    - environmental_medium
    - environmental_package
    - geographic_location_name
    - growth_facility
    - latitude_and_longitude
    - local_environmental_context
    - other_treatment
    - populus_genotype
    - soil_sampling_depth
slots:
  belowground_compartment:
    title: belowground compartment
    description: Belowground habitat sampled for Populus microbiome profiling.
    range: BelowgroundCompartmentEnum
    exact_mappings:
    - MIXS:0000013
    - MIXS:0000014
    - MIXS:0000008
    - ENVO:00005801
    slot_uri: MIXS:0000013
    aliases:
    - compartment
    - sample_type
    - niche
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: Populus-associated microbial habitat
      value_type: CATEGORICAL
  belowground_microbial_community_composition:
    title: belowground microbial community composition
    description: Archaeal, bacterial, and fungal amplicon profiles across drought-treated Populus compartments.
    multivalued: true
    range: string
    aliases:
    - bacterial_archaeal_profile
    - fungal_community_profile
    - asv_table
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: Populus belowground microbial community
      material_or_matrix: root endosphere, rhizosphere, and bulk soil
      method: 16S rRNA and ITS amplicon sequencing
      value_type: ARRAY
  broad_scale_environmental_context:
    title: broad-scale environmental context
    description: Broad-scale environmental context recorded for the NMDC biosample.
    range: uriorcurie
    exact_mappings:
    - MIXS:0000012
    slot_uri: MIXS:0000012
    aliases:
    - env_broad_scale
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  collection_date:
    title: collection date
    description: Date when the NMDC biosample was collected.
    range: datetime
    exact_mappings:
    - MIXS:0000011
    slot_uri: MIXS:0000011
    aliases:
    - collection_date
    annotations:
      role: DATE_TIME_VARIABLE; COVARIATE
      value_type: DATETIME
  drought_treatment:
    title: drought treatment
    description: Chronic drought condition applied to Populus field plots.
    range: string
    exact_mappings:
    - MIXS:0000591
    - MIXS:0000754
    - MIXS:0000008
    slot_uri: MIXS:0000591
    aliases:
    - drought_treatment
    - water_treatment
    - watering_regimen
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: Populus field plot
      value_type: CATEGORICAL
  elevation:
    description: Elevation recorded for the NMDC biosample.
    range: float
    unit:
      descriptive_name: m
      ucum_code: m
    aliases:
    - elev
    annotations:
      role: SPATIAL_INDEX; COVARIATE; MEASURED_VARIABLE
      value_type: NUMERIC
  environmental_medium:
    title: environmental medium
    description: Environmental medium or material sampled for the NMDC biosample.
    range: uriorcurie
    exact_mappings:
    - MIXS:0000014
    slot_uri: MIXS:0000014
    aliases:
    - env_medium
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  environmental_package:
    title: environmental package
    description: MIxS environmental package used for the NMDC biosample metadata.
    range: EnvPackageEnum
    aliases:
    - env_package
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  geographic_location_name:
    title: geographic location name
    description: Geographic location name recorded for the NMDC biosample.
    range: string
    aliases:
    - geo_loc_name
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  growth_facility:
    title: growth facility
    description: Growth facility or experimental facility context recorded for the NMDC biosample.
    range: string
    aliases:
    - growth_facil
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  latitude_and_longitude:
    title: latitude and longitude
    description: Latitude and longitude coordinates recorded for the NMDC biosample.
    range: string
    aliases:
    - lat_lon
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  local_environmental_context:
    title: local environmental context
    description: Local environmental context recorded for the NMDC biosample.
    range: uriorcurie
    exact_mappings:
    - MIXS:0000013
    slot_uri: MIXS:0000013
    aliases:
    - env_local_scale
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  other_treatment:
    title: other treatment
    description: Additional treatment descriptor recorded in NMDC biosample metadata.
    range: string
    exact_mappings:
    - MIXS:0000008
    aliases:
    - other_treatment
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
  populus_genotype:
    title: Populus genotype
    description: Host genotype of Populus trichocarpa sampled under drought.
    range: string
    exact_mappings:
    - MIXS:0000365
    - MIXS:0000008
    slot_uri: MIXS:0000365
    aliases:
    - genotype
    - host_genotype
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: Populus trichocarpa
      value_type: CATEGORICAL
  soil_sampling_depth:
    title: soil sampling depth
    description: Depth interval for belowground Populus samples recorded in NMDC biosample metadata.
    range: float
    unit:
      descriptive_name: meter
      ucum_code: m
    exact_mappings:
    - MIXS:0000018
    slot_uri: MIXS:0000018
    aliases:
    - depth
    - soil_depth
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      measured_entity: belowground sampling interval
      material_or_matrix: soil, rhizosphere, or root endosphere
      value_type: NUMERIC
enums:
  BelowgroundCompartmentEnum:
    permissible_values:
      root endosphere: null
      rhizosphere:
        meaning: ENVO:00005801
      bulk soil: null
