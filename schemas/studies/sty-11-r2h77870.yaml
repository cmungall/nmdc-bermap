slots:
  populus_genotype:
    title: Populus genotype
    description: Host plant genotype associated with each multi-omics sample.
    range: PopulusGenotypeEnum
    aliases:
    - genotype
    - host_genotype
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: Populus trichocarpa
      value_type: CATEGORICAL
  plant_compartment:
    title: plant compartment
    description: Plant-associated compartment sampled for microbiome and metabolomic profiling.
    range: PlantCompartmentEnum
    aliases:
    - compartment
    - sample_type
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: Populus-associated microbial habitat
      value_type: CATEGORICAL
  soil_sampling_depth:
    title: soil sampling depth
    description: Soil or rhizosphere sampling depth recorded in NMDC biosample metadata when available.
    range: float
    unit:
      descriptive_name: meter
      ucum_code: m
    aliases:
    - depth
    - soil_depth
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      measured_entity: Populus-associated soil sampling interval
      material_or_matrix: rhizosphere and soil
      value_type: NUMERIC
  metagenome_derived_community_composition:
    title: metagenome-derived community composition
    description: Microbial taxonomic and functional community profiles derived from metagenomic sequencing.
    multivalued: true
    range: string
    aliases:
    - metagenome_profile
    - taxonomic_profile
    - functional_profile
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: Populus-associated microbial community
      material_or_matrix: root endosphere, rhizosphere, and soil
      method: metagenomics
      value_type: ARRAY
  metabolite_abundance_profile:
    title: metabolite abundance profile
    description: Metabolomic feature abundances measured across Populus-associated samples.
    multivalued: true
    range: string
    aliases:
    - metabolite_abundance
    - metabolomic_profile
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: Populus-associated metabolome
      material_or_matrix: root endosphere, rhizosphere, and soil
      method: metabolomics
      value_type: ARRAY
  soil_ph:
    title: soil pH
    description: Soil pH recorded in NMDC biosample metadata for Bio-Scales rhizosphere and soil samples.
    range: float
    aliases:
    - ph
    - soil_pH
    annotations:
      role: COVARIATE; MEASURED_VARIABLE
      measured_entity: soil acidity
      material_or_matrix: soil
      value_type: NUMERIC
  ammonium_nitrogen_content:
