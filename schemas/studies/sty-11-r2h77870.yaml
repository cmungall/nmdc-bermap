id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/sty-11-r2h77870
name: bio_scales_integrated_metagenomic_metabolomic_and_transcriptomic_survey_of_populus
title: Bio-Scales - Integrated Metagenomic, Metabolomic and Transcriptomic Survey of Populus
description: 'Bio-Scales pilot project (PIs: Doktycz, Schadt, Mayes, Muchero, Weston) understanding how
  plant traits modify the microbiome and how the coupled plant-soil-microbial system influences nitrogen
  transformation. Integrated dataset of 318 metagenomes, 98 transcriptomes, and 314 metabolomic profiles
  from 27 P. trichocarpa genotypes across Oregon field sites. Largest publicly available metagenomics
  repository on tree endosphere.'
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
