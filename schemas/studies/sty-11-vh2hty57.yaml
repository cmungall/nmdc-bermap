id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/sty-11-vh2hty57
name: the_impact_of_stand_age_and_fertilization_on_the_soil_microbiome_of_miscanthus_giganteus
title: The Impact of Stand Age and Fertilization on the Soil Microbiome of Miscanthus × giganteus
description: Investigation of effects of stand age and N fertilizer rates on microbial community structure
  in Miscanthus × giganteus replicated chronosequence trial.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://w3id.org/gold.vocab/
  GOLDPATH: https://w3id.org/gold.path/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study sty-11-vh2hty57.
    slots:
    - stand_age
    - nitrogen_fertilizer_rate
    - soil_sampling_depth
    - soil_bacterial_community_composition
    - collection_date
    - geographic_location_name
    - latitude_and_longitude
    - elevation
    - broad_scale_environmental_context
    - local_environmental_context
    - environmental_medium
    - environmental_package
    - ecosystem
    - ecosystem_category
    - ecosystem_type
    - ecosystem_subtype
    - specific_ecosystem
    - growth_facility
    - other_experimental_factor
    - other_treatment
    - host_crop
    - soil_compartment
    - plot_id
    - biological_replicate
    - sampling_timepoint
slots:
  stand_age:
    title: stand age
    description: Age of the Miscanthus stand at sampling, computed as collection year minus planting year.
      Not surfaced as a structured field in NMDC biosample metadata; derive from the planting-year token
      in samp_name (e.g., `_2017_` → 2017) or from the NCBI BioSample `Year` custom attribute. Corn
      comparator plots are stand age 0.
    range: integer
    unit:
      descriptive_name: years
      ucum_code: a
    aliases:
    - stand_age
    - stand_age_years
    - plot_age
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING; DERIVED
      measured_entity: Miscanthus field plot
      value_type: INTEGER
      data_source_notes: 'No source column in NMDC biosample_set. Derive from the planting-year
        token in samp_name (e.g., 4095_M_2017_… → 2017) or from NCBI BioSample Year custom attribute.
        Audit 2026-06-17.'
  nitrogen_fertilizer_rate:
    title: nitrogen fertilizer rate
    description: 'Nitrogen fertilizer application rate assigned to Miscanthus or Corn field plots.
      Levels are 0/200/400 kg N/ha for Miscanthus and 0/200/300 kg N/ha for the Corn comparator.
      Not stored as a numeric in NMDC; parse from the string field experimental_factor_other (e.g.
      "N_fertilization_rate: 200 kg/ha") or from NCBI BioSample Nitrogen custom attribute.'
    range: float
    unit:
      descriptive_name: kilogram per hectare
      ucum_code: kg/har
    aliases:
    - nitrogen_rate
    - n_rate
    - fertilizer_regimen
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE; DERIVED
      measured_entity: Miscanthus or Corn field plot
      value_type: NUMERIC
      data_source_notes: 'NMDC stores as string in experimental_factor_other, e.g.
        "N_fertilization_rate: 200 kg/ha"; parse to extract numeric. NCBI BioSample carries the
        same value as a clean numeric in the Nitrogen custom attribute. The MIxS-standard
        biosample_set_fertilizer_regm satellite table has 0 rows for this study. Audit 2026-06-17.'
  soil_sampling_depth:
    title: soil sampling depth
    description: Depth interval for Miscanthus soil samples recorded in NMDC biosample metadata. NMDC
      stores depth as a min/max range (e.g., 0.0–0.1 m via `depth_has_minimum_numeric_value` and
      `depth_has_maximum_numeric_value`); this scalar slot captures the maximum (lower-boundary) value.
    range: float
    unit:
      descriptive_name: meter
      ucum_code: m
    aliases:
    - depth
    - depth_has_maximum_numeric_value
    - soil_depth
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      measured_entity: soil sampling interval
      material_or_matrix: soil
      value_type: NUMERIC
  soil_bacterial_community_composition:
    title: soil bacterial community composition
    description: 16S amplicon profile of soil bacterial communities associated with Miscanthus stands.
    multivalued: true
    range: string
    aliases:
    - otu_table
    - asv_table
    - bacterial_community_profile
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: soil bacterial community
      material_or_matrix: soil
      method: 16S rRNA amplicon sequencing
      value_type: ARRAY
  collection_date:
    title: collection date
    description: Date when the NMDC biosample was collected.
    range: datetime
    aliases:
    - collection_date
    annotations:
      role: DATE_TIME_VARIABLE; COVARIATE
      value_type: DATETIME
  geographic_location_name:
    title: geographic location name
    description: Geographic location name recorded for the NMDC biosample.
    range: string
    aliases:
    - geo_loc_name
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  latitude_and_longitude:
    title: latitude and longitude
    description: Latitude and longitude coordinates recorded for the NMDC biosample.
    range: string
    aliases:
    - lat_lon
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  elevation:
    description: Elevation recorded for the NMDC biosample.
    range: float
    unit:
      descriptive_name: m
      ucum_code: m
    aliases:
    - elev
    annotations:
      role: SPATIAL_INDEX; COVARIATE; MEASURED_VARIABLE
      value_type: NUMERIC
  broad_scale_environmental_context:
    title: broad-scale environmental context
    description: Broad-scale environmental context recorded for the NMDC biosample.
    range: uriorcurie
    aliases:
    - env_broad_scale
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  local_environmental_context:
    title: local environmental context
    description: Local environmental context recorded for the NMDC biosample.
    range: uriorcurie
    aliases:
    - env_local_scale
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  environmental_medium:
    title: environmental medium
    description: Environmental medium or material sampled for the NMDC biosample.
    range: uriorcurie
    aliases:
    - env_medium
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
      data_source_notes: 'NMDC asserts ENVO:00005802 (bulk soil) uniformly across all 696 biosamples
        — wrong for 648 of them per NCBI custom Soil=Rizosphere attribute and per the _A/B/C_ vs
        _Bulk_/_BULK_DNA_ samp_name markers. Profile slot is correct; ingest is mislabeled. Use the
        sibling soil_compartment slot to recover the rhizo/bulk distinction. Audit 2026-06-17.'
  environmental_package:
    title: environmental package
    description: MIxS environmental package used for the NMDC biosample metadata.
    range: EnvPackageEnum
    aliases:
    - env_package
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem:
    description: GOLD ecosystem classification recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_category:
    title: ecosystem category
    description: GOLD ecosystem category recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_category
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_type:
    title: ecosystem type
    description: GOLD ecosystem type recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_type
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_subtype:
    title: ecosystem subtype
    description: GOLD ecosystem subtype recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_subtype
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  specific_ecosystem:
    title: specific ecosystem
    description: Specific GOLD ecosystem classification recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - specific_ecosystem
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  growth_facility:
    title: growth facility
    description: Growth facility or experimental facility context recorded for the NMDC biosample.
    range: string
    aliases:
    - growth_facil
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  other_experimental_factor:
    title: other experimental factor
    description: Additional experimental factor recorded in NMDC biosample metadata.
    range: string
    aliases:
    - experimental_factor_other
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
  other_treatment:
    title: other treatment
    description: Additional treatment descriptor recorded in NMDC biosample metadata. For this study,
      `other_treatment` is overloaded to carry the host crop (Miscanthus vs Corn comparator); see the
      `host_crop` slot for the structured form.
    range: string
    aliases:
    - other_treatment
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
  host_crop:
    title: host crop
    description: Host crop sampled — Miscanthus × giganteus (perennial bioenergy crop) or Corn
      (Zea mays, annual-crop comparator). Source-of-record on NMDC is the string field
      `other_treatment`; on NCBI BioSample it is the custom `Plant` attribute.
    range: HostCropEnum
    aliases:
    - other_treatment
    - host_species
    - crop
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: bioenergy crop host
      value_type: CATEGORICAL
  soil_compartment:
    title: soil compartment
    description: Soil compartment sampled — rhizosphere vs bulk soil. Not captured in any NMDC
      structured field for this study (`env_medium` is uniformly `bulk soil` for all 696 biosamples,
      which is incorrect for the 648 rhizosphere samples). Recoverable from the `samp_name` token
      (`_A_` / `_B_` / `_C_` markers → rhizosphere; `_Bulk_` / `_BULK_DNA_` markers → bulk soil) or
      from the NCBI BioSample `Soil` custom attribute (`Rizosphere` for the 648 INSDC-deposited
      samples; 48 bulk samples were not deposited to NCBI).
    range: SoilCompartmentEnum
    aliases:
    - compartment
    - sample_type
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING; DERIVED
      measured_entity: soil microbial habitat
      material_or_matrix: soil
      value_type: CATEGORICAL
  plot_id:
    title: plot id
    description: Field plot identifier within the CABBI EnergyFarm chronosequence trial. Not surfaced
      as a structured NMDC field; parse from the `P<n>` token in `samp_name` (e.g., `P50`) or from
      NCBI BioSample `Plot` custom attribute.
    range: string
    aliases:
    - plot
    - plot_number
    annotations:
      role: IDENTIFIER; STUDY_DESIGN_INDEPENDENT_VARIABLE; DERIVED
      measured_entity: field plot
      value_type: IDENTIFIER
  biological_replicate:
    title: biological replicate
    description: Biological replicate identifier within a (plot × date) cell — three sub-samples per
      cell on the early April timepoints, two on the later timepoints. Encoded in `samp_name` as
      `_A_` / `_B_` / `_C_` markers, or (for the 2018-04-25 amplicon batch) by sequential sample IDs.
      Captured on NCBI BioSample as the `replicate` custom attribute.
    range: string
    aliases:
    - replicate
    - rep
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; DERIVED
      measured_entity: biological replicate sub-sample
      value_type: CATEGORICAL
  sampling_timepoint:
    title: sampling timepoint
    description: Growing-season sampling timepoint within the 2018 collection window. Five timepoints
      were sampled (2018-04-25, 04-29, 05-14, 05-30, 07-03); use this slot for the time-series axis
      independent of the `collection_date` covariate.
    range: datetime
    aliases:
    - timepoint
    - collection_date
    annotations:
      role: DATE_TIME_VARIABLE; STUDY_DESIGN_INDEPENDENT_VARIABLE
      temporal_resolution: five timepoints across one growing season
      time_series: 'true'
      value_type: DATETIME
enums:
  HostCropEnum:
    permissible_values:
      miscanthus:
        meaning: NCBITaxon:62336
        aliases:
        - Miscanthus × giganteus
      zea mays:
        meaning: NCBITaxon:4577
        aliases:
        - corn
        - maize
  SoilCompartmentEnum:
    permissible_values:
      rhizosphere:
        meaning: ENVO:00005801
      bulk soil:
        meaning: ENVO:00005802
