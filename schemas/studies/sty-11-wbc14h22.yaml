id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/sty-11-wbc14h22
name: switchgrass_cropping_systems_on_marginal_lands
title: Switchgrass cropping systems on marginal lands
description: Understanding how rhizosphere microbiome influences soil nitrogen transformations under low-
  and high-N conditions across five locations in the Great Lakes Region.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study sty-11-wbc14h22.
    slots:
    - agrochemical_addition
    - broad_scale_environmental_context
    - collection_date
    - current_vegetation
    - ecosystem
    - ecosystem_category
    - ecosystem_subtype
    - ecosystem_type
    - elevation
    - environmental_medium
    - environmental_package
    - field_location
    - geographic_location_name
    - growth_facility
    - latitude_and_longitude
    - local_environmental_context
    - nitrogen_treatment
    - other_experimental_factor
    - rhizosphere_bacterial_community_composition
    - sieving
    - soil_sampling_depth
    - specific_ecosystem
slots:
  agrochemical_addition:
    title: agrochemical addition
    description: Agrochemical addition recorded in NMDC biosample metadata.
    range: string
    exact_mappings:
    - MIXS:0000008
    aliases:
    - agrochem_addition
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
  broad_scale_environmental_context:
    title: broad-scale environmental context
    description: Broad-scale environmental context recorded for the NMDC biosample.
    range: uriorcurie
    exact_mappings:
    - MIXS:0000012
    slot_uri: MIXS:0000012
    aliases:
    - env_broad_scale
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  collection_date:
    title: collection date
    description: Date when the NMDC biosample was collected.
    range: datetime
    exact_mappings:
    - MIXS:0000011
    slot_uri: MIXS:0000011
    aliases:
    - collection_date
    annotations:
      role: DATE_TIME_VARIABLE; COVARIATE
      value_type: DATETIME
  current_vegetation:
    title: current vegetation
    description: Current vegetation descriptor recorded for the NMDC biosample.
    range: string
    aliases:
    - cur_vegetation
    annotations:
      role: COVARIATE; GROUPING
      value_type: TEXT
  ecosystem:
    description: GOLD ecosystem classification recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_category:
    title: ecosystem category
    description: GOLD ecosystem category recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_category
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_subtype:
    title: ecosystem subtype
    description: GOLD ecosystem subtype recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_subtype
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_type:
    title: ecosystem type
    description: GOLD ecosystem type recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_type
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  elevation:
    description: Elevation recorded for the NMDC biosample.
    range: float
    unit:
      descriptive_name: m
      ucum_code: m
    aliases:
    - elev
    annotations:
      role: SPATIAL_INDEX; COVARIATE; MEASURED_VARIABLE
      value_type: NUMERIC
  environmental_medium:
    title: environmental medium
    description: Environmental medium or material sampled for the NMDC biosample.
    range: uriorcurie
    exact_mappings:
    - MIXS:0000014
    slot_uri: MIXS:0000014
    aliases:
    - env_medium
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  environmental_package:
    title: environmental package
    description: MIxS environmental package used for the NMDC biosample metadata.
    range: EnvPackageEnum
    aliases:
    - env_package
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  field_location:
    title: field location
    description: Great Lakes region field site where each switchgrass sample was collected.
    range: string
    exact_mappings:
    - MIXS:0000013
    slot_uri: MIXS:0000013
    aliases:
    - location
    - site
    - field_site
    annotations:
      role: GROUPING; SPATIAL_INDEX
      measured_entity: field site
      value_type: CATEGORICAL
  geographic_location_name:
    title: geographic location name
    description: Geographic location name recorded for the NMDC biosample.
    range: string
    aliases:
    - geo_loc_name
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  growth_facility:
    title: growth facility
    description: Growth facility or experimental facility context recorded for the NMDC biosample.
    range: string
    aliases:
    - growth_facil
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  latitude_and_longitude:
    title: latitude and longitude
    description: Latitude and longitude coordinates recorded for the NMDC biosample.
    range: string
    aliases:
    - lat_lon
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  local_environmental_context:
    title: local environmental context
    description: Local environmental context recorded for the NMDC biosample.
    range: uriorcurie
    exact_mappings:
    - MIXS:0000013
    slot_uri: MIXS:0000013
    aliases:
    - env_local_scale
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  nitrogen_treatment:
    title: nitrogen treatment
    description: Low- versus high-nitrogen cropping system condition for switchgrass plots.
    range: NitrogenTreatmentEnum
    exact_mappings:
    - MIXS:0000556
    - MIXS:0000008
    - BERVO:0000895
    slot_uri: MIXS:0000556
    aliases:
    - nitrogen_treatment
    - n_treatment
    - fertilizer_regimen
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: switchgrass cropping system
      value_type: CATEGORICAL
  other_experimental_factor:
    title: other experimental factor
    description: Additional experimental factor recorded in NMDC biosample metadata.
    range: string
    exact_mappings:
    - MIXS:0000008
    aliases:
    - experimental_factor_other
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
  rhizosphere_bacterial_community_composition:
    title: rhizosphere bacterial community composition
    description: 16S amplicon profile of switchgrass rhizosphere bacterial communities.
    multivalued: true
    range: string
    exact_mappings:
    - MIXS:0000014
    slot_uri: MIXS:0000014
    aliases:
    - otu_table
    - asv_table
    - bacterial_community_profile
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: rhizosphere bacterial community
      material_or_matrix: rhizosphere soil
      method: 16S rRNA amplicon sequencing
      value_type: ARRAY
  sieving:
    description: Sieving protocol or size fraction recorded in NMDC biosample metadata.
    range: string
    aliases:
    - sieving
    annotations:
      role: STUDY_DESIGN_CONTROLLED_VARIABLE; COVARIATE
      value_type: CATEGORICAL
  soil_sampling_depth:
    title: soil sampling depth
    description: Depth interval for switchgrass soil samples recorded in NMDC biosample metadata.
    range: float
    unit:
      descriptive_name: meter
      ucum_code: m
    exact_mappings:
    - MIXS:0000018
    slot_uri: MIXS:0000018
    aliases:
    - depth
    - soil_depth
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      measured_entity: soil sampling interval
      material_or_matrix: soil
      value_type: NUMERIC
  specific_ecosystem:
    title: specific ecosystem
    description: Specific GOLD ecosystem classification recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - specific_ecosystem
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
enums:
  NitrogenTreatmentEnum:
    permissible_values:
      low nitrogen: null
      high nitrogen: null
