id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/sty-11-zs2syx06
name: meadow_soil_metagenomes_from_the_angelo_coast_range_reserve
title: Meadow Soil Metagenomes from the Angelo Coast Range Reserve
description: Assembled metagenomes for 60 soil samples across multiple soil plots from a meadow in the
  Angelo Coastal Range Reserve, CA, part of a climate change experiment.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  CHEBI: http://purl.obolibrary.org/obo/CHEBI_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study sty-11-zs2syx06.
    slots:
    - broad_scale_environmental_context
    - climate_change_experiment_treatment
    - collection_date
    - ecosystem
    - ecosystem_category
    - ecosystem_subtype
    - ecosystem_type
    - elevation
    - environmental_medium
    - geographic_location_name
    - habitat
    - latitude_and_longitude
    - local_environmental_context
    - meadow_soil_metagenome_profile
    - meadow_soil_plot
    - sample_collection_site
    - sampling_location
    - soil_metagenome_assembled_genome
    - soil_sampling_depth
    - specific_ecosystem
slots:
  broad_scale_environmental_context:
    title: broad-scale environmental context
    description: Broad-scale environmental context recorded for the NMDC biosample.
    range: uriorcurie
    exact_mappings:
    - MIXS:0000012
    slot_uri: MIXS:0000012
    aliases:
    - env_broad_scale
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  climate_change_experiment_treatment:
    title: climate change experiment treatment
    description: Field experiment condition associated with each meadow soil sample.
    range: string
    exact_mappings:
    - MIXS:0000008
    - MIXS:0000754
    slot_uri: MIXS:0000754
    aliases:
    - climate_treatment
    - field_treatment
    - experimental_factor
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE
      measured_entity: meadow soil field plot
      value_type: CATEGORICAL
  collection_date:
    title: collection date
    description: Date when the NMDC biosample was collected.
    range: datetime
    exact_mappings:
    - MIXS:0000011
    slot_uri: MIXS:0000011
    aliases:
    - collection_date
    annotations:
      role: DATE_TIME_VARIABLE; COVARIATE
      value_type: DATETIME
  ecosystem:
    description: GOLD ecosystem classification recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_category:
    title: ecosystem category
    description: GOLD ecosystem category recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_category
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_subtype:
    title: ecosystem subtype
    description: GOLD ecosystem subtype recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_subtype
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  ecosystem_type:
    title: ecosystem type
    description: GOLD ecosystem type recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - ecosystem_type
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
  elevation:
    description: Elevation recorded for the NMDC biosample.
    range: float
    unit:
      descriptive_name: m
      ucum_code: m
    aliases:
    - elev
    annotations:
      role: SPATIAL_INDEX; COVARIATE; MEASURED_VARIABLE
      value_type: NUMERIC
  environmental_medium:
    title: environmental medium
    description: Environmental medium or material sampled for the NMDC biosample.
    range: uriorcurie
    exact_mappings:
    - MIXS:0000014
    slot_uri: MIXS:0000014
    aliases:
    - env_medium
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  geographic_location_name:
    title: geographic location name
    description: Geographic location name recorded for the NMDC biosample.
    range: string
    aliases:
    - geo_loc_name
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  habitat:
    description: Habitat descriptor recorded for the NMDC biosample.
    range: string
    aliases:
    - habitat
    annotations:
      role: COVARIATE; GROUPING
      value_type: TEXT
  latitude_and_longitude:
    title: latitude and longitude
    description: Latitude and longitude coordinates recorded for the NMDC biosample.
    range: string
    aliases:
    - lat_lon
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  local_environmental_context:
    title: local environmental context
    description: Local environmental context recorded for the NMDC biosample.
    range: uriorcurie
    exact_mappings:
    - MIXS:0000013
    slot_uri: MIXS:0000013
    aliases:
    - env_local_scale
    annotations:
      role: COVARIATE; GROUPING
      value_type: ONTOLOGY_TERM
  meadow_soil_metagenome_profile:
    title: meadow soil metagenome profile
    description: Assembled metagenomic composition and functional potential from Angelo meadow soils.
    multivalued: true
    range: string
    exact_mappings:
    - MIXS:0000014
    slot_uri: MIXS:0000014
    aliases:
    - metagenome_profile
    - assembly
    - functional_profile
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: meadow soil microbial community
      material_or_matrix: soil
      method: metagenomic sequencing and assembly
      value_type: ARRAY
  meadow_soil_plot:
    title: meadow soil plot
    description: Field plot identifier or location within the Angelo Coast Range Reserve meadow experiment.
    range: string
    exact_mappings:
    - MIXS:0001107
    - MIXS:0000013
    slot_uri: MIXS:0001107
    aliases:
    - plot_id
    - sample_name
    - field_plot
    annotations:
      role: IDENTIFIER; SPATIAL_INDEX; GROUPING
      measured_entity: meadow soil plot
      material_or_matrix: soil
      value_type: IDENTIFIER
  sample_collection_site:
    title: sample collection site
    description: Sample collection site descriptor recorded for the NMDC biosample.
    range: string
    aliases:
    - sample_collection_site
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  sampling_location:
    title: sampling location
    description: Sampling location descriptor recorded for the NMDC biosample.
    range: string
    aliases:
    - location
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      value_type: TEXT
  soil_metagenome_assembled_genome:
    title: soil metagenome-assembled genome
    description: Genome bins assembled from meadow soil metagenomes.
    multivalued: true
    range: string
    aliases:
    - mag_id
    - genome_bin
    - assembly_bin
    annotations:
      role: DERIVED; MEASURED_VARIABLE
      measured_entity: soil microbial genome
      method: metagenome assembly and binning
      value_type: ARRAY
  soil_sampling_depth:
    title: soil sampling depth
    description: Depth interval for Angelo meadow soil samples recorded in NMDC biosample metadata.
    range: float
    unit:
      descriptive_name: meter
      ucum_code: m
    exact_mappings:
    - MIXS:0000018
    slot_uri: MIXS:0000018
    aliases:
    - depth
    - soil_depth
    annotations:
      role: SPATIAL_INDEX; COVARIATE
      measured_entity: meadow soil sampling interval
      material_or_matrix: soil
      value_type: NUMERIC
  specific_ecosystem:
    title: specific ecosystem
    description: Specific GOLD ecosystem classification recorded for the NMDC biosample.
    range: GoldEcosystemPathEnum
    aliases:
    - specific_ecosystem
    annotations:
      role: COVARIATE; GROUPING
      value_type: CATEGORICAL
