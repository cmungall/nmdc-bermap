id: https://w3id.org/nmdc-sfas-brcs/profiles/studies/sugarcane_and_oilcane_microbiome_differences
name: sugarcane_and_oilcane_microbiome_differences
title: Sugarcane and Oilcane Microbiome Differences
description: Study of bacterial and fungal microbiome structure and potential functions in leaves, stems,
  roots, rhizospheres, and bulk soils of sugarcane and metabolically engineered oilcane grown in greenhouses.
prefixes:
  linkml: https://w3id.org/linkml/
  profiles: https://w3id.org/nmdc-sfas-brcs/profiles/
  MIXS: https://w3id.org/mixs/
  ENVO: http://purl.obolibrary.org/obo/ENVO_
  PO: http://purl.obolibrary.org/obo/PO_
  NCBITaxon: http://purl.obolibrary.org/obo/NCBITaxon_
  BERVO: http://purl.obolibrary.org/obo/BERVO_
  OBI: http://purl.obolibrary.org/obo/OBI_
  UO: http://purl.obolibrary.org/obo/UO_
  obo: http://purl.obolibrary.org/obo/
  nmdc: https://w3id.org/nmdc/
  GOLD: https://gold.jgi.doe.gov/
default_prefix: profiles
default_range: string
imports:
- ../base
classes:
  Record:
    description: Per-record data dictionary for study sugarcane_and_oilcane_microbiome_differences.
    slots:
    - bacterial_and_fungal_community_composition
    - crop_accession_type
    - plant_compartment
slots:
  bacterial_and_fungal_community_composition:
    title: bacterial and fungal community composition
    description: 16S and ITS amplicon profiles used to compare sugarcane and oilcane microbiomes.
    multivalued: true
    range: string
    aliases:
    - bacterial_community_profile
    - fungal_community_profile
    - asv_table
    - otu_table
    annotations:
      role: STUDY_DESIGN_DEPENDENT_VARIABLE; MEASURED_VARIABLE
      measured_entity: sugarcane-associated microbial community
      material_or_matrix: leaves, stems, roots, rhizosphere, and bulk soil
      method: 16S rRNA and ITS amplicon sequencing
      value_type: ARRAY
  crop_accession_type:
    title: crop accession type
    description: Host plant type contrasting sugarcane with metabolically engineered oilcane accessions.
    range: CropAccessionTypeEnum
    exact_mappings:
    - MIXS:0000248
    - MIXS:0000365
    - MIXS:0000008
    slot_uri: MIXS:0000248
    aliases:
    - accession_type
    - crop_type
    - host_common_name
    annotations:
      role: EXPERIMENTAL_FACTOR; STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: Saccharum host plant
      value_type: CATEGORICAL
  plant_compartment:
    title: plant compartment
    description: Plant or soil compartment sampled for sugarcane and oilcane microbiome profiling.
    range: PlantCompartmentEnum
    exact_mappings:
    - MIXS:0000013
    - MIXS:0000014
    - MIXS:0000008
    - ENVO:00005801
    slot_uri: MIXS:0000013
    aliases:
    - compartment
    - tissue
    - sample_type
    annotations:
      role: STUDY_DESIGN_INDEPENDENT_VARIABLE; GROUPING
      measured_entity: sugarcane-associated microbial habitat
      value_type: CATEGORICAL
enums:
  CropAccessionTypeEnum:
    permissible_values:
      sugarcane: null
      oilcane: null
  PlantCompartmentEnum:
    permissible_values:
      leaf: null
      stem: null
      root: null
      rhizosphere:
        meaning: ENVO:00005801
      bulk soil: null
