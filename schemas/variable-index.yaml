datasets:
  kbs_lux_arbor_reserve_switchgrass_flux_data:
    program: nmdc_sfas_brcs:glbrc
    name: KBS Lux Arbor Reserve Switchgrass Flux Data
    variables:
    - name: net ecosystem carbon dioxide exchange
      description: Ecosystem-atmosphere carbon dioxide exchange measured by eddy covariance.
      roles: &id1007
      - MEASURED_VARIABLE
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      value_type: NUMERIC
      units: umol CO2 m-2 s-1
      bervo_term: &id1009
        id: BERVO:0000326
        label: total canopy net CO2 exchange
        mapping_relation: closeMatch
        mapping_note: BERVO term uses canopy framing, while AmeriFlux NEE/FC fields here are treated as
          ecosystem-atmosphere carbon dioxide exchange.
      measured_entity: switchgrass ecosystem-atmosphere carbon exchange
      method: eddy covariance flux tower
      temporal_resolution: sub-daily tower observations
      time_series: true
      source_field_names: &id1008
      - NEE
      - FC
    - name: total evaporation
      description: Water loss from the ecosystem inferred from flux tower observations.
      roles: &id1739
      - MEASURED_VARIABLE
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      value_type: NUMERIC
      units: mm
      bervo_term: &id1741
        id: BERVO:0000315
        label: total evaporation
        mapping_relation: exactMatch
      measured_entity: switchgrass ecosystem water exchange
      method: eddy covariance flux tower
      temporal_resolution: sub-daily tower observations
      time_series: true
      source_field_names: &id1740
      - ET
      - LE
    - name: soil temperature
      description: Soil temperature recorded as an environmental covariate for interpreting fluxes.
      roles: &id1599
      - MEASURED_VARIABLE
      - COVARIATE
      value_type: NUMERIC
      units: degree Celsius
      bervo_term: &id1601
        id: BERVO:0001477
        label: soil temperature
        mapping_relation: exactMatch
      mixs_terms: &id1602
      - &id2372
        id: MIXS:0001163
        label: soil temperature
        mapping_relation: exactMatch
      measured_entity: soil environment
      material_or_matrix: soil
      method: flux tower meteorological sensor
      temporal_resolution: sub-daily tower observations
      time_series: true
      source_field_names: &id1600
      - TS
      - soil_temperature
  gnps_influence_of_drought_and_wet_up_on_the_soil_lipidome_pnnl_soils_sfa:
    program: nmdc_sfas_brcs:pnnl_soil_microbiome
    name: GNPS- Influence of drought and wet-up on the soil lipidome (PNNL Soils SFA)
    variables:
    - name: drought and wet-up treatment
      description: Moisture perturbation treatment associated with soil lipidomics samples.
      roles: &id349
      - EXPERIMENTAL_FACTOR
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
      levels: &id350
      - drought
      - wet-up
      mixs_terms: &id354
      - id: MIXS:0000754
        label: perturbation
        mapping_relation: exactMatch
      - &id2374
        id: MIXS:0000591
        label: watering regimen
        mapping_relation: exactMatch
      measured_entity: soil moisture perturbation
      material_or_matrix: soil
      source_field_names: &id353
      - moisture_treatment
      - drought_wetup_treatment
      - perturbation
      enum_kind: static
      level_terms: &id351
      - value: drought
        id: null
      - value: wet-up
        id: null
      shared: &id352
        MIXS:0000591: 6
        MIXS:0000754: 12
    - name: soil lipid feature abundance
      description: GNPS molecular networking feature abundances for soil lipidomics.
      roles: &id1494
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      - MEASURED_VARIABLE
      value_type: ARRAY
      measured_entity: soil lipidome
      material_or_matrix: soil
      method: mass spectrometry metabolomics
      source_field_names: &id1495
      - lipid_feature_abundance
      - gnps_feature_table
      - molecular_network_features
  compass_ess_dive_data_portal:
    program: nmdc_sfas_brcs:compass_fme
    name: COMPASS ESS-DIVE Data Portal
    variables:
    - name: in situ sensor observation
      description: Automated soil, water, and plant sensor measurements available through the COMPASS
        portal.
      roles: &id774
      - MEASURED_VARIABLE
      value_type: ARRAY
      measured_entity: coastal TAI sensor network
      time_series: true
      source_field_names: &id775
      - sensor_observation
      - timestamp
      - water_level
      - soil_moisture
    - name: discrete sample characterization
      description: Chemical, biochemical, molecular, microbial, or plant characterization of collected
        coastal samples.
      roles: &id347
      - MEASURED_VARIABLE
      value_type: ARRAY
      measured_entity: coastal TAI sample
      source_field_names: &id348
      - chemistry_measurement
      - molecular_characterization
      - microbial_profile
      - plant_trait
