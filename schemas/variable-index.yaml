      value_type: CATEGORICAL
      mixs_terms: &id731
      - id: MIXS:0000248
        label: host common name
        mapping_relation: exactMatch
      - id: MIXS:0000008
        label: experimental factor
        mapping_relation: exactMatch
      measured_entity: Sorghum bicolor
      source_field_names: &id730
      - host_common_name
      - crop
      - host_species
      enum_kind: dynamic
      enum_source: HostCommonNameEnum
      shared: &id729
        MIXS:0000008: 73
        MIXS:0000248: 12
    - name: plant-associated compartment
      description: Sorghum plant-associated habitat sampled for community profiling or isolate recovery.
      roles: &id1177
