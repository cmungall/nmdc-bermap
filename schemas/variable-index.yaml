      - Shewanella oneidensis MR-1
      mixs_terms:
      - id: MIXS:0000008
        label: experimental factor
    - name: carbon source
      description: Defined carbon source in minimal medium.
      roles:
      - EXPERIMENTAL_FACTOR
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
