  sorghum_phyllosphere_microbiome:
    program: nmdc_sfas_brcs:glbrc
    name: Sorghum Phyllosphere Microbiome
    variables:
    - name: host crop
      description: Sorghum host associated with phyllosphere, aerial root mucilage, or rhizosphere samples.
      roles:
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      - GROUPING
      value_type: CATEGORICAL
      mixs_terms:
      - id: MIXS:0000248
        label: host common name
      - id: MIXS:0000008
        label: experimental factor
      measured_entity: Sorghum bicolor
      source_field_names:
      - host_common_name
      - crop
      - host_species
    - name: plant-associated compartment
      description: Sorghum plant-associated habitat sampled for community profiling or isolate recovery.
      roles:
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      - GROUPING
      value_type: CATEGORICAL
      levels:
      - phyllosphere
      - aerial root mucilage
      - rhizosphere
      mixs_terms:
      - id: MIXS:0000013
        label: local environmental context
      - id: MIXS:0000014
        label: environmental medium
      - id: MIXS:0000008
        label: experimental factor
      measured_entity: sorghum-associated microbial habitat
      source_field_names:
      - compartment
      - sample_type
      - niche
    - name: sorghum-associated microbial community composition
      description: Amplicon, metagenomic, or metatranscriptomic profiles of sorghum-associated microbial
        communities.
      roles:
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      - MEASURED_VARIABLE
      value_type: ARRAY
      measured_entity: sorghum-associated microbial community
      material_or_matrix: phyllosphere, aerial root mucilage, and rhizosphere
      method: amplicon sequencing, metagenomics, and metatranscriptomics
      source_field_names:
      - asv_table
      - metagenome_profile
      - transcript_abundance
    - name: bacterial isolate identity
      description: Identity of culturable sorghum-associated bacteria isolated from aerial root mucilage.
      roles:
      - IDENTIFIER
      - MEASURED_VARIABLE
      value_type: IDENTIFIER
      measured_entity: sorghum-associated bacterial isolate
      method: bacterial isolation and genome sequencing
      source_field_names:
      - isolate_id
      - strain_id
      - genome_accession
  switchgrass_root_and_soil_microbiome:
    program: nmdc_sfas_brcs:glbrc
    name: Switchgrass Root and Soil Microbiome
    variables:
    - name: sampling site
      description: GLBRC Marginal Land Experiment site where switchgrass root or soil samples were collected.
      roles:
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      - SPATIAL_INDEX
      - GROUPING
      value_type: CATEGORICAL
      levels:
      - Lake City
      - Escanaba
      - Lux Arbor
      - Hancock
      - Rhinelander
      mixs_terms:
      - id: MIXS:0000013
        label: local environmental context
      - id: MIXS:0000008
        label: experimental factor
      measured_entity: field site
      source_field_names:
      - site
      - location
      - field_site
    - name: sample compartment
      description: Belowground habitat sampled for switchgrass-associated microbiome profiling.
      roles:
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      - GROUPING
      value_type: CATEGORICAL
      levels:
      - root
      - bulk soil
      mixs_terms:
      - id: MIXS:0000013
        label: local environmental context
      - id: MIXS:0000014
        label: environmental medium
      - id: MIXS:0000008
        label: experimental factor
      measured_entity: switchgrass-associated microbial habitat
      material_or_matrix: root and bulk soil
      source_field_names:
      - compartment
      - sample_type
      - niche
    - name: collection date
      description: Date or seasonal sampling point used to evaluate intra-annual microbiome dynamics.
      roles:
      - DATE_TIME_VARIABLE
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: DATETIME
      mixs_terms:
      - id: MIXS:0000011
        label: collection date
      - id: MIXS:0000829
        label: season
      - id: MIXS:0000008
        label: experimental factor
      measured_entity: sampling event
      temporal_resolution: biweekly soil and monthly root sampling during the 2018 growing season
      time_series: true
      source_field_names:
      - collection_date
      - sampling_date
      - date
    - name: nitrogen addition
      description: Nitrogen addition treatment evaluated as a possible driver of switchgrass microbiome
        structure.
      roles:
      - EXPERIMENTAL_FACTOR
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
      levels:
      - no nitrogen addition
      - nitrogen addition
      bervo_term:
        id: BERVO:0000895
        label: total fertilizer N amendment
      mixs_terms:
      - id: MIXS:0000556
        label: fertilizer regimen
      - id: MIXS:0000008
        label: experimental factor
      measured_entity: switchgrass field plot
      source_field_names:
      - nitrogen_addition
      - n_addition
      - fertilizer_regimen
    - name: bacterial and fungal community composition
      description: Amplicon-derived bacterial and fungal community profiles from switchgrass roots and
        soils.
      roles:
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      - MEASURED_VARIABLE
      value_type: ARRAY
      measured_entity: switchgrass-associated microbial community
      material_or_matrix: root and bulk soil
      method: 16S rRNA and ITS amplicon sequencing
      source_field_names:
      - otu_table
      - asv_table
      - bacterial_community_profile
      - fungal_community_profile
  transgenic_switchgrass_microbiome_effects:
    program: nmdc_sfas_brcs:glbrc
    name: Transgenic Switchgrass Microbiome Effects
    variables:
    - name: QsuB transgenic status
      description: Host plant engineering status for the shikimate pathway modification that reduces lignin
        content.
      roles:
      - EXPERIMENTAL_FACTOR
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
      levels:
      - wild type
      - QsuB transgenic
      mixs_terms:
      - id: MIXS:0000365
        label: host genotype
      - id: MIXS:0000008
        label: experimental factor
      measured_entity: Panicum virgatum
      source_field_names:
      - transgenic_status
      - genotype
      - qsub_status
    - name: plant compartment
      description: Switchgrass plant or soil compartment sampled for microbiome profiling.
      roles:
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      - GROUPING
      value_type: CATEGORICAL
      levels:
      - root
      - leaf
      - soil
      mixs_terms:
      - id: MIXS:0000013
        label: local environmental context
      - id: MIXS:0000014
        label: environmental medium
      - id: MIXS:0000008
        label: experimental factor
      measured_entity: switchgrass-associated microbial habitat
      source_field_names:
      - compartment
      - tissue
      - sample_type
    - name: bacterial and fungal community composition
      description: 16S and ITS amplicon profiles used to evaluate transgenic effects on switchgrass microbiomes.
      roles:
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      - MEASURED_VARIABLE
      value_type: ARRAY
      measured_entity: switchgrass-associated microbial community
      material_or_matrix: roots, leaves, and soil
      method: 16S rRNA and ITS amplicon sequencing
      source_field_names:
      - otu_table
      - asv_table
      - bacterial_community_profile
      - fungal_community_profile
  terpene_effects_on_sorghum_microbiome:
    program: nmdc_sfas_brcs:glbrc
    name: Terpene Effects on Sorghum Microbiome
    variables:
    - name: terpene treatment
      description: Exogenous terpene supplied belowground to test effects on sorghum rhizobiome communities.
      roles:
      - EXPERIMENTAL_FACTOR
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
      levels:
      - control
      - 1,8-cineole
      - linalool
      - nerolidol
      mixs_terms:
      - id: MIXS:0000751
        label: chemical administration
      - id: MIXS:0000008
        label: experimental factor
      measured_entity: sorghum rhizosphere
      source_field_names:
      - terpene
      - terpene_treatment
      - chemical_administration
    - name: terpene dose
      description: Concentration or dose level for exogenous terpene delivery.
      roles:
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: NUMERIC
      mixs_terms:
      - id: MIXS:0000751
        label: chemical administration
      - id: MIXS:0000008
        label: experimental factor
      measured_entity: terpene amendment
      source_field_names:
      - dose
      - concentration
      - terpene_concentration
    - name: sampling time point
      description: Sampling point relative to terpene application and plant growth.
