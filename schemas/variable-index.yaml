  mutant_phenotypes_for_thousands_of_bacterial_genes_of_unknown_function:
    program: nmdc_sfas_brcs:enigma
    name: Mutant phenotypes for thousands of bacterial genes of unknown function
    variables:
    - name: test bacterial species
      description: Bacterial species used as the parent strain for RB-TnSeq library construction and fitness
        profiling.
      roles:
      - EXPERIMENTAL_FACTOR
      - GROUPING
      value_type: CATEGORICAL
      levels:
      - Escherichia coli BW25113
      - Pseudomonas fluorescens FW300-N2E2
      - Shewanella oneidensis MR-1
      - (and 29 other species across Proteobacteria, Firmicutes, Actinobacteria, Bacteroidetes)
      mixs_terms:
      - id: MIXS:0000008
        label: experimental factor
      measured_entity: bacterial species
    - name: growth condition
      description: Defined growth condition (carbon source, nitrogen source, metal, antibiotic, or other
        stressor) applied to each library aliquot.
      roles:
      - EXPERIMENTAL_FACTOR
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
      levels:
      - carbon source (e.g., D-glucose, D-xylose, L-arabinose, glycerol)
      - nitrogen source
      - metal stressor
      - antibiotic
      - other defined inhibitor
      mixs_terms:
      - id: MIXS:0000008
        label: experimental factor
      measured_entity: defined growth condition (selective agent)
    - name: barcode-to-locus map
      description: Mapping from each library's random 20-bp barcodes to the transposon insertion sites
        in the parent genome, established once per organism by a single TnSeq (transposon-junction sequencing)
        run.
      roles:
      - IDENTIFIER
      - DERIVED
      value_type: ARRAY
      method: TnSeq (transposon-junction sequencing)
    - name: per-gene fitness value
      description: log2(end-of-experiment barcode abundance / Time0 abundance) per insertion-bearing gene,
        with a t-like statistic for confidence.
      roles:
      - MEASURED_VARIABLE
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      value_type: NUMERIC
      units: log2 fold change
      measured_entity: bacterial gene
      method: BarSeq amplicon read counting, normalized
