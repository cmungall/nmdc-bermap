studies:
  sty-11-e4yb9z58:
    program: nmdc_sfas_brcs:glbrc
    name: Seasonal activities of the phyllosphere microbiome of perennial crops
    variables:
    - name: sampling season
      description: Seasonal sampling point for phyllosphere microbiome activity measurements.
      roles:
      - DATE_TIME_VARIABLE
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      value_type: CATEGORICAL
      levels:
      - early season
      - mid season
      - late season
      mixs_terms:
      - id: MIXS:0000829
        label: season
      - id: MIXS:0000011
        label: collection date
      - id: MIXS:0000008
        label: experimental factor
      temporal_resolution: seasonal sampling over two growing seasons
      time_series: true
      source_field_names:
      - season
      - sampling_date
    - name: host crop
      description: Perennial bioenergy crop host sampled for phyllosphere community profiling.
      roles:
      - STUDY_DESIGN_INDEPENDENT_VARIABLE
      - GROUPING
      value_type: CATEGORICAL
      levels:
      - switchgrass
      - miscanthus
      mixs_terms:
      - id: MIXS:0000248
        label: host common name
      - id: MIXS:0000008
        label: experimental factor
      measured_entity: perennial bioenergy crop
      material_or_matrix: leaf phyllosphere
      source_field_names:
      - host_species
      - crop
    - name: phyllosphere transcript activity
      description: Microbial transcript abundance profiles used to infer seasonal activity of phyllosphere
        taxa.
      roles:
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      - MEASURED_VARIABLE
      value_type: ARRAY
      measured_entity: phyllosphere microbial community
      material_or_matrix: leaf phyllosphere
      method: metatranscriptomics
      temporal_resolution: seasonal sampling over two growing seasons
      time_series: true
      source_field_names:
      - transcript_abundance
      - gene_expression_profile
    - name: air temperature
      description: Average air temperature recorded in NMDC biosample metadata for the phyllosphere sampling
        event.
      roles:
      - COVARIATE
      - MEASURED_VARIABLE
      value_type: NUMERIC
      units: degree Celsius
      bervo_term:
        id: BERVO:0001370
        label: air temperature
      measured_entity: phyllosphere air environment
      material_or_matrix: air
      source_field_names:
      - avg_temp
      - air_temperature
    - name: sample carbon to nitrogen ratio
      description: Carbon-to-nitrogen ratio recorded for phyllosphere samples in NMDC biosample metadata.
      roles:
      - COVARIATE
      - MEASURED_VARIABLE
      value_type: NUMERIC
      units: dimensionless
      measured_entity: phyllosphere sample chemistry
      material_or_matrix: leaf phyllosphere
      source_field_names:
      - carb_nitro_ratio
      - c_n_ratio
    - name: sample total nitrogen content
      description: Total nitrogen content recorded for phyllosphere samples in NMDC biosample metadata.
      roles:
      - COVARIATE
      - MEASURED_VARIABLE
      value_type: NUMERIC
      units: percent
      measured_entity: phyllosphere sample chemistry
      material_or_matrix: leaf phyllosphere
      source_field_names:
      - tot_nitro_content
      - total_nitrogen
    - name: collection date
      description: Date when the NMDC biosample was collected.
      roles:
      - DATE_TIME_VARIABLE
      - COVARIATE
      value_type: DATETIME
      mixs_terms:
      - id: MIXS:0000011
        label: collection date
      source_field_names:
      - collection_date
    - name: geographic location name
      description: Geographic location name recorded for the NMDC biosample.
      roles:
      - SPATIAL_INDEX
      - COVARIATE
      value_type: TEXT
      source_field_names:
      - geo_loc_name
    - name: latitude and longitude
      description: Latitude and longitude coordinates recorded for the NMDC biosample.
      roles:
      - SPATIAL_INDEX
      - COVARIATE
      value_type: TEXT
      source_field_names:
      - lat_lon
    - name: elevation
      description: Elevation recorded for the NMDC biosample.
      roles:
      - SPATIAL_INDEX
      - COVARIATE
      - MEASURED_VARIABLE
      value_type: NUMERIC
      units: m
      source_field_names:
      - elev
    - name: broad-scale environmental context
      description: Broad-scale environmental context recorded for the NMDC biosample.
      roles:
      - COVARIATE
      - GROUPING
      value_type: ONTOLOGY_TERM
      mixs_terms:
      - id: MIXS:0000012
        label: broad-scale environmental context
