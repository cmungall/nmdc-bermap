  kbs_lux_arbor_reserve_switchgrass_flux_data:
    program: nmdc_sfas_brcs:glbrc
    name: KBS Lux Arbor Reserve Switchgrass Flux Data
    variables:
    - name: net ecosystem carbon dioxide exchange
      description: Ecosystem-atmosphere carbon dioxide exchange measured by eddy covariance.
      roles: &id996
      - MEASURED_VARIABLE
      - STUDY_DESIGN_DEPENDENT_VARIABLE
      value_type: NUMERIC
      units: umol CO2 m-2 s-1
      bervo_term: &id998
        id: BERVO:0000326
        label: total canopy net CO2 exchange
        mapping_relation: closeMatch
        mapping_note: BERVO term uses canopy framing, while AmeriFlux NEE/FC fields here are treated as
          ecosystem-atmosphere carbon dioxide exchange.
      measured_entity: switchgrass ecosystem-atmosphere carbon exchange
      method: eddy covariance flux tower
      temporal_resolution: sub-daily tower observations
      time_series: true
      source_field_names: &id997
      - NEE
      - FC
    - name: total evaporation
      description: Water loss from the ecosystem inferred from flux tower observations.
