# OAK adapter configuration for ontology validation
# Prefixes listed here will use strict validation mode
# - Missing terms will be treated as errors (not just INFO)
# - Terms will be cached locally for consistency

ontology_adapters:
  # Core biological/experimental ontologies used in this schema
  OBI: sqlite:obo:obi
  STATO: sqlite:obo:stato
  EFO: sqlite:obo:efo
  BERVO: sqlite:obo:bervo
  MIXS: sqlite:obo:mixs

  # Additional ontologies that may be useful
  GO: sqlite:obo:go
  CHEBI: sqlite:obo:chebi
  ENVO: sqlite:obo:envo
  NCBITaxon: sqlite:obo:ncbitaxon
  PO: sqlite:obo:po
  UO: sqlite:obo:uo

  # Skip validation for these prefixes (not real ontologies or not available)
  schema:
  dcterms:
  rdfs:
  skos:
  linkml:
  orcid:
  ror:
  doi:
  pmid:
  obo:
  IAO:
  # GOLD ecosystem vocabulary — fallback when no OBO term exists. Vocab terms
  # (e.g., GOLD:Endosphere) and path terms (e.g., GOLDPATH:5304) are not validated
  # for label match because path labels are hierarchy strings like
  # "Host-associated > Plants > Roots > Endosphere".
  GOLD:
  GOLDPATH:
